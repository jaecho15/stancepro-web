        gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.useProgram(this.pFlat);
        gl.uniformMatrix4fv(this.F.m, false, mat); gl.uniform1f(this.F.sc, SKY_VC);
        gl.uniform1f(this.F.rd, 0.0);
        gl.bindBuffer(gl.ARRAY_BUFFER, this.lDir); gl.enableVertexAttribArray(this.F.dir); gl.vertexAttribPointer(this.F.dir, 3, gl.FLOAT, false, 0, 0);
        gl.uniform4f(this.F.col, 0.45, 0.58, 0.85, 0.5); gl.uniform1f(this.F.sz, 1.0); gl.drawArrays(gl.LINES, 0, this.lCount);
        gl.disable(gl.BLEND);
      }
    };
    map.addLayer(layer); map.triggerRepaint();
  }

  function buildStarSphere(tex) {
    const NLAT = 48, NLON = 96, pos = [], uv = [], idx = [];
    for (let i = 0; i <= NLAT; i++) {
      const dec = 90 - (i / NLAT) * 180;
      for (let j = 0; j <= NLON; j++) {
        const ra = (j / NLON) * 360, v = skyVec(ra, dec, SKY_R);
        pos.push(v.x, v.y, v.z); uv.push(ra / 360, (dec + 90) / 180);
      }
    }
    for (let i = 0; i < NLAT; i++) for (let j = 0; j < NLON; j++) {
      const a = i * (NLON + 1) + j, b = a + NLON + 1;
      idx.push(a, b, a + 1, b, b + 1, a + 1);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
    g.setAttribute("uv", new THREE.Float32BufferAttribute(uv, 2));
    g.setIndex(idx);
    // Black-point + gain + gamma so the background reads as night sky, not
    // washed grey. MeshBasicMaterial can only multiply, so use a tiny shader.
    const mat = new THREE.ShaderMaterial({
      uniforms: { map: { value: tex }, uBlack: { value: SKY_BLACK },
                  uGain: { value: SKY_GAIN }, uGamma: { value: SKY_GAMMA } },
      side: THREE.DoubleSide, depthWrite: false,
      vertexShader: "varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }",
      fragmentShader: "uniform sampler2D map; uniform float uBlack, uGain, uGamma; varying vec2 vUv;" +
        "void main(){ vec3 c = texture2D(map, vUv).rgb; c = clamp((c - uBlack) / (1.0 - uBlack), 0.0, 1.0) * uGain;" +
        " c = pow(clamp(c, 0.0, 1.0), vec3(1.0 / uGamma)); gl_FragColor = vec4(c, 1.0); }"
    });
    return new THREE.Mesh(g, mat);
  }

  function makeLabel(text) {
    const c = document.createElement("canvas"), pad = 8;
    const ctx = c.getContext("2d");
    ctx.font = "600 30px -apple-system,Roboto,sans-serif";
    c.width = Math.ceil(ctx.measureText(text).width) + pad * 2; c.height = 44;
    ctx.font = "600 30px -apple-system,Roboto,sans-serif";   // reset after resize
    ctx.fillStyle = "rgba(150,180,225,0.9)"; ctx.textBaseline = "middle";
    ctx.fillText(text, pad, c.height / 2);
    const tex = new THREE.CanvasTexture(c);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
    sp.scale.set(c.width / c.height * 26, 26, 1);
    return sp;
  }

  function buildConstellations() {
    const lineMat = new THREE.LineBasicMaterial({ color: 0x5a78b0, transparent: true, opacity: 0.7, depthTest: false });
    const dotGeom = [], segs = [];
    ZODIAC.forEach(([name, stars, lines]) => {
      const pos = {};
      for (const id in stars) {
        const p = skyVec(stars[id][0] * 15, stars[id][1], SKY_R * 0.995);
        pos[id] = p; dotGeom.push(p.x, p.y, p.z);
      }
      lines.forEach(([x, y]) => { if (pos[x] && pos[y]) segs.push(pos[x].x, pos[x].y, pos[x].z, pos[y].x, pos[y].y, pos[y].z); });
      const ids = Object.keys(pos);
      const cx = ids.reduce((a, id) => a + pos[id].x, 0) / ids.length;
      const cy = ids.reduce((a, id) => a + pos[id].y, 0) / ids.length;
      const cz = ids.reduce((a, id) => a + pos[id].z, 0) / ids.length;
      const lbl = makeLabel(name);
      lbl.position.set(cx, cy, cz).multiplyScalar(SKY_R * 0.9 / Math.hypot(cx, cy, cz));
      skyGroup.add(lbl);
    });
    const lg = new THREE.BufferGeometry();
    lg.setAttribute("position", new THREE.Float32BufferAttribute(segs, 3));
    skyGroup.add(new THREE.LineSegments(lg, lineMat));
    const dg = new THREE.BufferGeometry();
    dg.setAttribute("position", new THREE.Float32BufferAttribute(dotGeom, 3));
    skyGroup.add(new THREE.Points(dg, new THREE.PointsMaterial({ color: 0xffffff, size: 3.4, sizeAttenuation: false, depthTest: false })));
  }

  function makeSun() {
    const c = document.createElement("canvas"); c.width = c.height = 128;
    const ctx = c.getContext("2d");
    const g = ctx.createRadialGradient(64, 64, 4, 64, 64, 64);
    g.addColorStop(0, "rgba(255,250,225,1)"); g.addColorStop(0.18, "rgba(255,240,190,0.95)");
    g.addColorStop(0.5, "rgba(255,220,150,0.35)"); g.addColorStop(1, "rgba(255,220,150,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
    sp.scale.set(90, 90, 1); sp.visible = false;
    return sp;
  }

  function skyBg(sunAlt) {                         // background colour by sun altitude
    const day = new THREE.Color(0x7fb4e6), night = new THREE.Color(0x05070f);
    const t = Math.max(0, Math.min(1, (sunAlt + 6) / 12));   // -6..+6 twilight ramp
    return night.clone().lerp(day, t);
  }

  function syncCam() {
    const b = map.getBearing(), p = map.getPitch();
    const el = (p - 90) + PITCH_OFFSET_DEG;        // view-centre altitude
    cam.position.set(0, 0, 0); cam.up.set(0, 1, 0);
    cam.lookAt(altAzVec(el, b, 1));
    let fov = 37;
    if (map.transform && map.transform.fov) fov = map.transform.fov / D2R;
    cam.fov = fov * FOV_SCALE; cam.updateProjectionMatrix();
    renderer.render(scene, cam);
  }

  function applyMode() {
    if (PROBE_MODE) return;   // probe run — leave the map untouched
    const now = new Date();
    const lst = (gmstDeg(now) + OBS_LON) % 360;
    const su = sunEq(now), sp = eqToAltAz(su.ra, su.dec, lst);
    const sunAlt = forceNight ? -18 : sp.alt;
    const showStars = sunAlt < 4;                  // stars during night + late twilight
    skyGroup.visible = showStars;
    scene.background = skyBg(sunAlt);
    if (sunSprite) {
      sunSprite.visible = !forceNight && sp.alt > -3;
      if (sunSprite.visible) sunSprite.position.copy(altAzVec(sp.alt, sp.az, SKY_R * 0.94));
    }
    // Reveal the sky canvas only in 3D (terrain hides the ground half).
    const reveal = terrainOn;
    if (map.getLayer && map.getLayer("bg")) map.setPaintProperty("bg", "background-opacity", reveal ? 0 : 1);
    skyCanvas.style.opacity = reveal ? 1 : 0;
    syncCam();
  }

  function initSky() {
    SKY_LST = (gmstDeg(new Date()) + OBS_LON) % 360;   // bake sky for load time
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    sunSprite = makeSun(); scene.add(sunSprite);
    buildConstellations();
    loader.load(STARMAP, tex => {
      if (tex.colorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
      starMesh = buildStarSphere(tex);
      skyGroup.add(starMesh);
      applyMode();
    }, undefined, err => { console.log("starmap load failed", err); applyMode(); });
    map.on("render", syncCam);
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      cam.aspect = window.innerWidth / window.innerHeight; cam.updateProjectionMatrix();
      syncCam();
    });
    renderer.setSize(window.innerWidth, window.innerHeight, false);
  }

  // ---- Depth-occlusion probe (MapLibre custom 3D layer) -------------------
  function unitSphere(nlat, nlon) {
    const off = [], idx = [];
    for (let i = 0; i <= nlat; i++) {
      const th = i / nlat * Math.PI;
      for (let j = 0; j <= nlon; j++) {
        const ph = j / nlon * 2 * Math.PI;
        off.push(Math.sin(th) * Math.cos(ph), Math.sin(th) * Math.sin(ph), Math.cos(th));
      }
    }
    for (let i = 0; i < nlat; i++) for (let j = 0; j < nlon; j++) {
      const a = i * (nlon + 1) + j, b = a + nlon + 1;
      idx.push(a, b, a + 1, b, b + 1, a + 1);
    }
    return { off, idx };
  }

  function initProbe() {
    const lon = OBS_LON, lat = OBS_LAT, RADIUS_M = 400;
    const sph = unitSphere(24, 48);
    const layer = {
      id: "depth-probe", type: "custom", renderingMode: "3d",
      onAdd(m, gl) {
        const vs = "attribute vec3 a_off; uniform mat4 u_matrix; uniform vec3 u_center; uniform float u_r;" +
          "varying vec3 v_n; void main(){ v_n = a_off; gl_Position = u_matrix * vec4(u_center + a_off * u_r, 1.0); }";
        const fs = "precision mediump float; varying vec3 v_n;" +
          "void main(){ float d = max(0.25, dot(normalize(v_n), normalize(vec3(0.4,0.5,0.75))));" +
          " gl_FragColor = vec4(vec3(1.0,0.55,0.15) * d, 1.0); }";
        const cs = (t, s) => { const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh);
          if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) console.log("probe shader err", gl.getShaderInfoLog(sh)); return sh; };
        this.prog = gl.createProgram();
        gl.attachShader(this.prog, cs(gl.VERTEX_SHADER, vs));
        gl.attachShader(this.prog, cs(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(this.prog);
        this.aOff = gl.getAttribLocation(this.prog, "a_off");
        this.uMatrix = gl.getUniformLocation(this.prog, "u_matrix");
        this.uCenter = gl.getUniformLocation(this.prog, "u_center");
        this.uR = gl.getUniformLocation(this.prog, "u_r");
        this.vbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, this.vbo);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(sph.off), gl.STATIC_DRAW);
        this.ibo = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.ibo);
        gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(sph.idx), gl.STATIC_DRAW);
        this.count = sph.idx.length; this._logged = false;
      },
      render(gl, matrix) {
        // The 2nd arg is a 16-float matrix in older MapLibre and an options
        // object in v4+. Handle both, and log the shape once so we KNOW.
        const mat = (matrix && matrix.length) ? matrix
          : (matrix && (
              (matrix.defaultProjectionData && matrix.defaultProjectionData.mainMatrix) ||
              matrix.mainMatrix || matrix.modelViewProjectionMatrix || matrix.projMatrix))
          || matrix;
        if (!this._logged) {
          console.log("probe render — arg:",
            matrix && matrix.length ? "float[" + matrix.length + "]"
              : "object keys=" + (matrix ? Object.keys(matrix).join(",") : "null"),
            "| mat len=", mat && mat.length);
          this._logged = true;
        }
        let elev = 0;
        try { const e = map.queryTerrainElevation([lon, lat]); if (e != null) elev = e; } catch (x) {}
        if (!elev) elev = 900;
        const mc = maplibregl.MercatorCoordinate.fromLngLat([lon, lat], elev);
        const scale = mc.meterInMercatorCoordinateUnits();
        gl.useProgram(this.prog);
        gl.enable(gl.DEPTH_TEST); gl.depthFunc(gl.LEQUAL); gl.depthMask(true); gl.disable(gl.BLEND);
        gl.bindBuffer(gl.ARRAY_BUFFER, this.vbo);
        gl.enableVertexAttribArray(this.aOff);
        gl.vertexAttribPointer(this.aOff, 3, gl.FLOAT, false, 0, 0);
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.ibo);
        gl.uniformMatrix4fv(this.uMatrix, false, mat);
        gl.uniform3f(this.uCenter, mc.x, mc.y, mc.z);
        gl.uniform1f(this.uR, RADIUS_M * scale);
        gl.drawElements(gl.TRIANGLES, this.count, gl.UNSIGNED_SHORT, 0);
      }
    };
    map.addLayer(layer);
    map.triggerRepaint();
    console.log("depth probe added at", lon.toFixed(4), lat.toFixed(4), "r=" + RADIUS_M + "m");
  }

  // Night-sky chip: force the star sky on regardless of the actual sun time so
  // the rider can preview the constellations any time of day.
  // Widen the camera field of view in night mode so a whole swath of sky is
  // visible at once — a 37° view sits INSIDE the Milky Way with no edges; ~55°
  // shows the band flanked by darker sky. MapLibre clamps fov to ≤60°.
  let _dayFov = null;
  function setFov(deg) {
    try {
      const t = map.transform;
      if (!t) return;
      if (_dayFov === null && typeof t.fov === "number") _dayFov = t.fov;
      try { t.fov = deg; } catch (e) {}                   // public setter (often read-only)
      if (typeof t._fov === "number") t._fov = deg * Math.PI / 180;   // poke the private field
      map.resize();                                       // forces matrices to recompute from _fov
      map.triggerRepaint();
    } catch (e) {}
  }

  document.getElementById("skybtn").onclick = function () {
    // Cycle auto → night → day → auto. Auto follows the real sun (which can be
    // night at the resort even when it's daytime where you are — e.g. testing a
    // US resort from Asia), so an explicit day/night override is needed to
    // preview each look on demand.
    if (!forceNight && !forceDay) { forceNight = true; forceDay = false; }
    else if (forceNight) { forceNight = false; forceDay = true; }
    else { forceNight = false; forceDay = false; }
    this.className = forceNight ? "on" : (forceDay ? "day" : "off");
    this.textContent = forceNight ? "☾" : (forceDay ? "☀" : "◐");
    this.setAttribute("aria-label", forceNight ? "Night" : (forceDay ? "Day" : "Auto day/night"));
    applyNightStyle();       // instant: paint-property tint (bg/water/terrain)
    // Tilt UP toward the sky at night so it feels like standing on the summit
    // under a big sky. Snappy (250 ms) so the day/night flip feels immediate.
    // NO setFov() here: the FOV poke was a no-op on device (read-only) that still
    // forced a full map.resize() → tile re-layout hitch, which was the main cause
    // of the slow transition. The anisotropic sky already locks to the terrain
    // FOV, so widening the map FOV at night is no longer needed.
    if (terrainOn) map.easeTo({ pitch: forceNight ? 82 : 64, duration: 250 });
    map.triggerRepaint();
  };

  map.on("load", () => {
    // Fit BEFORE enabling terrain: an instant fitBounds while terrain is
    // active can drop the camera below the surface → blank screen.
    map.fitBounds([[w, s], [e_, n]], { padding: 40, duration: 0 });
    map.setPitch(64); map.setBearing(15);
    map.setTerrain({ source: "dem", exaggeration: 1.15 });   // ← the real 3D
    // Off-piste route drawing overlay — never let a feature fault break the map.
    try { OffpisteDraw.init(map, meta, art); } catch (e) { console.log("op init failed", e); }
    // Clip piste/lift geometry to this resort's terrain extent [w..e_, s..n].
    // geometry.json over-includes the whole valley; lines beyond the loaded z15
    // terrain drape at elevation 0 → stretched lines (esp. iOS WKWebView, which
    // loads fewer far tiles). Drop features with no vertex inside the extent —
    // neighbouring resorts arrive via the on-demand nbgeo loader instead.
    (async () => {
      if (meta.destination_id) return;   // bc-*: no geometry.json baked (v1)
      try {
        const gj = await (await fetch(art("geometry.json"))).json();
        const inExtent = (a) => {
          if (!a) return false;
          if (typeof a[0] === "number") return a[0] >= w && a[0] <= e_ && a[1] >= s && a[1] <= n;
          for (let i = 0; i < a.length; i++) if (inExtent(a[i])) return true;
          return false;
        };
        const feats = (gj.features || []).filter((f) => inExtent(f.geometry && f.geometry.coordinates));
        if (map.getSource("geometry")) {
          map.getSource("geometry").setData({ type: "FeatureCollection", features: feats });
        }
      } catch (e) { console.log("geometry clip failed", e); }
    })();
    map.once("idle", () => console.log("rendered: first idle frame"));
    if (PROBE_MODE) { initProbe(); } else { initSkyLayer(); applyNightStyle(); }

    // ---------- Neighbouring resorts: full data on-demand as they pan into view ----------
    // The focused resort is loaded inline (above). Each neighbour (id + centroid
    // from the host) is fetched LAZILY the first time its centre enters the
    // viewport: runs/lifts/names into a shared geometry source, hillshade/slope/
    // cliff draped over its bbox (adopting the current chip + night state), and
    // its 5 m core_bounds registered with the DEM router. Capped so an
    // interconnected valley loads what you actually look at, not all 30 at once.
    const NB_BASE = id => "https://ryiitcblrrqvjvxkobpf.supabase.co/storage/v1/object/public/ride-tracker-static/"
      + (id.indexOf("bc-") === 0 ? "terrain_backcountry_v1" : "terrain_offpiste_v1") + "/" + id + "/";
    const NB_MAX = 10;
    const nbLoaded = {};
    let nbCount = 0;
    const nbGeoData = { type: "FeatureCollection", features: [] };
    const nbContourData = { type: "FeatureCollection", features: [] };
    function nbInitGeo() {
      if (map.getSource("nbgeo")) return;
      map.addSource("nbgeo", { type: "geojson", data: nbGeoData });
      map.addLayer({ id: "nb-lifts", type: "line", source: "nbgeo", filter: ["has", "aerialway"],
        paint: { "line-color": "#2A2F38", "line-width": 2, "line-dasharray": [1.5, 1.5] } }, "nearby-dots");
      map.addLayer({ id: "nb-pistes", type: "line", source: "nbgeo",
        filter: ["any", ["has", "piste:type"], ["has", "piste:difficulty"]],
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": ["match", ["string", ["get", "piste:difficulty"], ""],
          "novice", "#2BAA52", "easy", "#2870C9", "intermediate", "#D72D27",
          "advanced", "#1F2530", "expert", "#05070A", "#8A94A0"],
          "line-width": 2.4, "line-opacity": 0.95 } }, "nearby-dots");
      map.addLayer({ id: "nb-piste-labels", type: "symbol", source: "nbgeo", minzoom: 12.5,
        filter: ["all", ["has", "name"], ["any", ["has", "piste:type"], ["has", "piste:difficulty"]]],
        layout: { "symbol-placement": "line", "symbol-spacing": 220, "text-field": NAME,
          "text-font": ["Noto Sans Bold"], "text-size": 11, "text-padding": 4,
          "text-rotation-alignment": "viewport", "text-pitch-alignment": "viewport" },
        paint: { "text-color": "#1F2937", "text-halo-color": "#FFFFFF", "text-halo-width": 1.5 } }, "nearby-dots");
      map.addLayer({ id: "nb-lift-labels", type: "symbol", source: "nbgeo", minzoom: 12,
        filter: ["all", ["has", "name"], ["has", "aerialway"]],
        layout: { "symbol-placement": "line", "symbol-spacing": 240, "text-field": NAME,
          "text-font": ["Noto Sans Regular"], "text-size": 10.5, "text-offset": [0, -0.9], "text-padding": 4,
          "text-rotation-alignment": "viewport", "text-pitch-alignment": "viewport" },
        paint: { "text-color": "#2A2F38", "text-halo-color": "#FFFFFF", "text-halo-width": 1.4 } }, "nearby-dots");
    }
    // A neighbour's core_bounds lands AFTER the DEM tiles for that area were
    // already fetched as 30 m Terrarium (the loader fires on idle — i.e. while
    // that very viewport is rendered), and MapLibre never re-requests a loaded
    // tile, so the neighbour 5 m mesh silently never appeared (verified: last
    // z14 request at t=51.28s vs neighbour meta at t=51.9s — routeDem rewrites
    // fine when asked again). setTiles() with the SAME url forces a source
    // reload through routeDem with the now-populated coreRegions; debounced so
    // one reload covers a whole neighbour batch.
    let demReloadTimer = null;
    function scheduleDemReload() {
      clearTimeout(demReloadTimer);
      demReloadTimer = setTimeout(() => {
        try {
          const s = map.getSource("dem");
          if (s && s.setTiles) s.setTiles(["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"]);
        } catch (e) { console.log("dem reload failed", e); }
      }, 700);
    }
    async function loadNeighbor(nb) {
      if (!nb.id || nbLoaded[nb.id] || nbCount >= NB_MAX) return;
      nbLoaded[nb.id] = true; nbCount++;
      try {
        const base = NB_BASE(nb.id);
        const nm = await (await fetch(base + "meta.json?v=" + VER)).json();
        const b = nm.bounds_3857; if (!b) throw new Error("no bounds");
        nbInitGeo();
        // hillshade/slope/cliff draped over this neighbour's bbox (single image,
        // or pieces if oversized), then synced to the current chip + night state.
        const nd = drapeSpec("__" + nb.id, nm, b, base);
        Object.keys(nd.sources).forEach(id => { if (!map.getSource(id)) map.addSource(id, nd.sources[id]); });
        nd.layers.forEach(L => { if (!map.getLayer(L.id)) map.addLayer(L, "c100"); });
        applyHillNight(isNightNow());          // dim the new neighbour hill(s)+forest at night
        applyKindVis("slope"); applyKindVis("extreme");   // match the current chip state
        applyKindVis("forest");                // incl. the default-ON forest toggle
        if (nm.dem_tiles && nm.dem_tiles.core_bounds) { coreRegions.push(nm.dem_tiles.core_bounds); scheduleDemReload(); }
        if (nm.destination_id) return;   // backcountry neighbour: mesh+drape only (no geometry/contours baked in v1)
        const geo = await (await fetch(base + "geometry.json?v=" + VER)).json();
        // Clip the neighbour's runs to ITS OWN terrain extent before adding —
        // the same guard the focused resort gets. nbgeo has no other clip, so a
        // neighbour whose geometry.json still over-includes (stale pre-clip
        // cache, or its own valley) would drape past its loaded terrain →
        // stretched lines the moment you pan onto it. b = nm.bounds_3857.
        const nbW = m2lon(b[0]), nbE = m2lon(b[2]), nbS = m2lat(b[1]), nbN = m2lat(b[3]);
        const inNb = (a) => {
          if (!a) return false;
          if (typeof a[0] === "number") return a[0] >= nbW && a[0] <= nbE && a[1] >= nbS && a[1] <= nbN;
          for (let i = 0; i < a.length; i++) if (inNb(a[i])) return true;
          return false;
        };
        (geo.features || []).forEach(f => { if (inNb(f.geometry && f.geometry.coordinates)) nbGeoData.features.push(f); });
        if (map.getSource("nbgeo")) map.getSource("nbgeo").setData(nbGeoData);
        // Contours too — an interconnect member reached by panning (aggregate
        // degraded view → member zoom-in, e.g. Dolomiti Superski → Val Gardena)
        // should read like a focused resort. Same styling as c100/c50; only the
        // rendered classes are merged to keep the shared source lean.
        try {
          const cj = await (await fetch(base + "contours.json?v=" + VER)).json();
          if (!map.getSource("nbcontours")) {
            map.addSource("nbcontours", { type: "geojson", data: nbContourData });
            const before = map.getLayer("nb-lifts") ? "nb-lifts" : "nearby-dots";
            map.addLayer({ id: "nb-c100", type: "line", source: "nbcontours",
              filter: ["==", ["get", "cls"], "major"],
              paint: { "line-color": "#38485C", "line-width": 1.2, "line-opacity": 0.45 } }, before);
            map.addLayer({ id: "nb-c50", type: "line", source: "nbcontours", minzoom: 13,
              filter: ["==", ["get", "cls"], "mid"],
              paint: { "line-color": "#38485C", "line-width": 0.9, "line-opacity": 0.35 } }, before);
          }
          (cj.features || []).forEach(f => {
            const cls = f.properties && f.properties.cls;
            if (cls === "major" || cls === "mid") nbContourData.features.push(f);
          });
          map.getSource("nbcontours").setData(nbContourData);
        } catch (e) { console.log("neighbour contours skipped", nb.id, e); }
      } catch (e) {
        console.log("neighbour load failed", nb.id, e);
        nbLoaded[nb.id] = false; nbCount--;   // isolated failure; allow a retry
      }
    }
    function loadVisibleNeighbors() {
      if (nbCount >= NB_MAX || !nearby.length) return;
      const vb = map.getBounds();
      for (const r of nearby) {
        if (nbCount >= NB_MAX) break;
        if (r.id && !nbLoaded[r.id] && vb.contains([r.lo, r.la])) loadNeighbor(r);
      }
    }
    map.on("idle", loadVisibleNeighbors);
    loadVisibleNeighbors();

    // Defensive: if the container measured 0 at init, resize once settled.
    setTimeout(() => { map.resize(); }, 300);
  });
})();
</script>
</body>
</html>
