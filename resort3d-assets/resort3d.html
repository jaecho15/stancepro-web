<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- inline empty favicon: the base origin is a fake domain (CORS anchor), so
     the browser's automatic /favicon.ico probe would log a noisy
     ERR_NAME_NOT_RESOLVED without this -->
<link rel="icon" href="data:,">
<title>3D Terrain</title>
<!-- Libraries are VENDORED and injected inline by the native host
     (Resort3DPreviewView.swift / Resort3DActivity.kt) from app-bundled copies —
     NOT fetched from a CDN. This makes the 3D engine work fully offline and
     immune to unpkg outages (which previously took the map down, and exposed
     even online users to a third-party single point of failure).
     Versions are PINNED — maplibre-gl@4.7.1, three@0.160.0. Do NOT bump: the
     offline tile router + terrain unproject/queryTerrainElevation behaviour is
     validated against 4.7.1 only. Keep the iOS/Android bytes identical. -->
<style>__MAPLIBRE_CSS__</style>
<script>__MAPLIBRE_JS__</script>
<!-- Three.js — real night sky (NASA Deep Star Maps texture) + zodiac lines,
     composited behind the transparent MapLibre canvas. -->
<script>__THREE_JS__</script>
<style>
  /* Safe-area plumbing: iOS resolves env() (viewport-fit=cover above);
     Android WebView always reports env()=0, so Resort3DActivity injects
     real insets as inline --safe-* vars on <html> (inline wins). */
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
  }
  html, body { margin:0; padding:0; height:100%; background:#EAF0F5; }
  /* Sky canvas sits BEHIND the map; the map's background layer is made
     transparent at runtime (3D only) so above-horizon shows the sky. */
  #sky { position:absolute; inset:0; z-index:0; }
  #map { position:absolute; inset:0; z-index:1; background:transparent; }
  #skybtn.on { background:rgba(20,24,40,.92); color:#fff; }
  #skybtn.day { background:rgba(240,186,70,.95); color:#3a2a00; }
  #err { position:absolute; top:calc(var(--safe-top) + 12px); left:12px; right:12px; z-index:9;
         font:14px -apple-system,Roboto,sans-serif; color:#B00; display:none;
         background:rgba(255,255,255,.9); border-radius:8px; padding:10px; }
  /* Resort title fallback chip — top-center, shown only when the summit
     pin (preferred name placement) can't be derived from the elevation
     artifact. Kept clear of the host close button (top-left, iOS) and
     the zoom control (top-right). */
  #title { position:absolute; top:calc(var(--safe-top) + 10px); left:50%;
           transform:translateX(-50%); z-index:9; max-width:70%;
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
           font:600 14px -apple-system,Roboto,sans-serif; color:#fff;
           padding:8px 14px; border-radius:18px;
           background:rgba(31,37,48,.82); box-shadow:0 2px 8px rgba(0,0,0,.25);
           display:none; }
  /* Summit pin: name chip hovering over the resort's highest point.
     MapLibre owns the marker root's transform, so the bob animation
     lives on an inner wrapper; the ground dot stays fixed. */
  .peak-wrap { display:flex; flex-direction:column; align-items:center;
               pointer-events:none; }
  .peak-bob { display:flex; flex-direction:column; align-items:center;
              animation:peakbob 2.6s ease-in-out infinite; }
  .peak-chip { font:600 13px -apple-system,Roboto,sans-serif; color:#fff;
               background:rgba(31,37,48,.86); padding:7px 12px;
               border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,.3);
               white-space:nowrap; max-width:72vw; overflow:hidden;
               text-overflow:ellipsis; }
  .peak-chip .pe { font-weight:500; font-size:11px; opacity:.75; margin-left:6px; }
  .peak-tail { width:2px; height:16px; background:rgba(31,37,48,.65); }
  .peak-dot { width:7px; height:7px; border-radius:50%; background:#fff;
              border:2px solid rgba(31,37,48,.85); margin-top:1px; }
  @keyframes peakbob { 0%,100% { transform:translateY(0); }
                       50% { transform:translateY(-6px); } }
  /* Control column, bottom-right, clear of the attribution chip. */
  #ctl { position:absolute; bottom:calc(var(--safe-bottom) + 40px);
         right:calc(var(--safe-right) + 12px); z-index:9;
         display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  #ctl button { font:600 13px/1 -apple-system,Roboto,sans-serif;
                width:44px; height:44px; padding:0; border-radius:50%; border:0;
                display:inline-flex; align-items:center; justify-content:center;
                box-shadow:0 2px 8px rgba(0,0,0,.25); }
  #ctl button.on  { background:rgba(255,255,255,.92); color:#1F2530; }
  #ctl button.off { background:rgba(31,37,48,.82); color:#fff; }
  #op-aspect { background:rgba(31,37,48,.82); color:#fff; }
  #op-aspect.on { background:rgba(255,255,255,.92); color:#1F2530; }
  #ctl button[disabled] { opacity:.4; }
  #slope-legend { position:absolute; left:8px; bottom:calc(var(--safe-bottom) + 44px); z-index:9;
                  display:none; background:rgba(20,24,34,.9); border-radius:12px; padding:9px 11px;
                  box-shadow:0 2px 12px rgba(0,0,0,.35); font:12px -apple-system,Roboto,sans-serif; color:#dfe8f2; }
  #slope-legend.show { display:block; }
  #slope-legend .sl-h { font-weight:600; color:#eaf; margin-bottom:6px; }
  #slope-legend .sl-bar { display:flex; width:168px; height:13px; border-radius:4px; overflow:hidden; }
  #slope-legend .sl-bar i { flex:1; }
  #slope-legend .sl-ticks { display:flex; justify-content:space-between; width:168px; margin-top:3px; font-size:10px; color:#cfe; }
  #slope-legend .sl-note { border-top:0.5px solid rgba(255,255,255,.14); margin-top:6px; padding-top:5px; color:#ffd166; font-size:11px; }
  #zbadge { position:absolute; right:calc(var(--safe-right) + 12px); top:calc(var(--safe-top) + 100px); z-index:9;
            font:600 11px/1.3 -apple-system,Roboto,sans-serif; color:#dfe8f2; background:rgba(20,24,34,.86);
            padding:5px 9px; border-radius:11px; box-shadow:0 2px 8px rgba(0,0,0,.25); }
  #zbadge b { color:#8fe; font-weight:600; }
  /* Keep MapLibre's own controls out of the status bar / rounded corners. */
  .maplibregl-ctrl-top-right { top:var(--safe-top); right:var(--safe-right); }
  .maplibregl-ctrl-bottom-right { bottom:var(--safe-bottom); right:var(--safe-right); }
  .maplibregl-ctrl-bottom-left { bottom:var(--safe-bottom); left:var(--safe-left); }
  .maplibregl-ctrl-attrib, .maplibregl-ctrl-attrib a { font-size:8px; line-height:1.3; }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="map"></div>
<div id="err"></div>
<div id="title"></div>
<!-- Host-resolved resort display name (app language → English → native),
     injected as element text so quotes/apostrophes in names can't break
     the script. Unreplaced placeholder = fall back to meta.json name. -->
<div id="hostname" style="display:none">__RESORT_NAME__</div>
<!-- Nearby resorts (≤50 km, nearest 30) as a JSON array of
     {n: name, la: lat, lo: lon}, names already localized by the host.
     Same text-node trick; unreplaced placeholder = no nearby pins. -->
<div id="nearby" style="display:none">__NEARBY__</div>
<div id="zbadge">z…</div>
<div id="ctl">
  <button id="tbtn" class="on">2D</button>
  <button id="skybtn" class="off" aria-label="Auto day/night">◐</button>
  <button id="op-aspect" disabled aria-label="Aspect"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><polygon points="12,3 16,12 8,12" fill="currentColor"/><polygon points="12,21 16,12 8,12"/></svg></button>
  <button id="bSlope" class="off" aria-label="Slope angle"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18H20"/><path d="M4 18L19 6.5"/><path d="M10 18A6 6 0 0 0 8.3 13.7"/></svg></button>
  <button id="bForest" class="on" aria-label="Forest"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L16.5 11H14L18.5 18H5.5L10 11H7.5Z"/><path d="M12 18V22"/></svg></button>
</div>
<div id="slope-legend">
  <div class="sl-h">Slope angle</div>
  <div class="sl-bar"><i style="background:#F2E50A"></i><i style="background:#F46F24"></i><i style="background:#DE055B"></i><i style="background:#6B21A8"></i></div>
  <div class="sl-ticks"><span>30</span><span>35</span><span>40</span><span>45</span><span>+</span></div>
  <div class="sl-note">Uncoloured ≠ safe</div>
</div>
<!-- ===== Off-piste route drawing (Stage-1). Self-contained & namespaced (op-*);
     injects its own CSS/DOM, samples the LiDAR elev_5m artifact for the slope
     profile (NOT queryTerrainElevation, which is exaggerated/reference-relative),
     and posts the saved route to the native host. init(map, meta, art) is called
     in the map load handler once terrain is set. Verified in the drawing harness
     2026-07-09. Keep iOS/Android bytes identical. ===== -->
<script>
window.OffpisteDraw = (function(){
  var map, meta, art, elevImg=null, ready=false, southern=false;
  var active=false, drawing=false, pts=[], savedRoutes=[], aspectOn=false, aspectBuilt=false;
  var flying=false, flyRAF=null, savedCam=null, routeOpen=false;
  var pinMode=false, waypoints=[], wpMarkers=[], wpPopup=null, depthInfo=null;
  var SRC="op-route", LYR="op-route-line";
  var WMx=20037508.342789244;
  var lon2mx=function(l){return l/180*WMx;}, lat2my=function(l){return Math.log(Math.tan(Math.PI/4+l*Math.PI/360))*WMx/Math.PI;};
  var el={};
  function byId(i){return document.getElementById(i);}

  function injectCSS(){
    var css = ""
    + "#op-badge{position:absolute;top:calc(var(--safe-top,0px) + 40px);left:8px;z-index:10;"
    +   "background:rgba(20,24,34,.86);color:#dfe8f2;border-radius:10px;padding:7px 10px;line-height:1.4;"
    +   "font:12px -apple-system,Roboto,sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.3);max-width:56%}"
    + "#op-badge b{color:#8fe;font-weight:600}#op-badge .l{color:#6de26d}#op-badge .e{color:#ffd166}#op-badge .op-snow{color:#9fd8ff}"
    + "#op-tools{position:absolute;top:calc(var(--safe-top,0px) + 140px);right:calc(var(--safe-right,0px) + 12px);"
    +   "z-index:10;display:flex;flex-direction:column;gap:8px;align-items:flex-end}"
    + ".op-btn{background:rgba(20,24,34,.86);color:#eaf;border:0;border-radius:50%;padding:0;"
    +   "font:600 13px/1 -apple-system,Roboto,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.3);display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px}"
    + ".op-btn.on{background:#2f7dfb;color:#fff}"
    + ".op-btn[disabled]{opacity:.4}"
    + "#op-oob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:11;"
    +   "background:rgba(210,60,50,.94);color:#fff;padding:9px 14px;border-radius:20px;font-weight:600;"
    +   "opacity:0;transition:opacity .18s;pointer-events:none;font-family:-apple-system,Roboto,sans-serif}"
    + "#op-oob.show{opacity:1}"
    + "#op-dock{position:absolute;left:8px;right:8px;bottom:calc(var(--safe-bottom,0px) + 8px);z-index:8;"
    +   "background:rgba(20,24,34,.9);border-radius:12px;padding:7px 10px;box-shadow:0 2px 12px rgba(0,0,0,.35);"
    +   "font:12px -apple-system,Roboto,sans-serif;display:none}"
    + "#op-dock.show{display:block}"
    + "#op-summary{color:#eaf;display:flex;gap:12px;flex-wrap:wrap;align-items:baseline;margin-bottom:3px}"
    + "#op-summary .big{font-size:15px;font-weight:700}#op-summary .g30{color:#ff9f0a}#op-summary .g45{color:#ff453a}"
    + "#op-prof{width:100%;height:74px;display:block}"
    + "#op-disc{color:#9fb0c2;font-size:11px;margin-top:3px}"
    + "#op-saved-chip{position:absolute;top:calc(var(--safe-top,0px) + 98px);left:8px;z-index:10;display:none;background:rgba(20,24,34,.8);color:#7fd8ff;font:11px -apple-system,Roboto,sans-serif;padding:5px 9px;border-radius:8px}"
    + "#op-saved-chip.show{display:block}"
    + "#op-hint{position:absolute;top:calc(var(--safe-top,0px) + 8px);left:50%;transform:translateX(-50%);z-index:10;display:none;background:rgba(20,24,34,.82);color:#cfe;font:11px -apple-system,Roboto,sans-serif;padding:5px 9px;border-radius:8px;max-width:80%;white-space:nowrap;text-align:center}"
    + "#op-hint.show{display:block}"
    + "#op-aspect-legend{position:absolute;bottom:calc(var(--safe-bottom,0px) + 140px);left:8px;z-index:10;display:none;background:rgba(20,24,34,.9);border-radius:12px;padding:10px 12px;font:10px -apple-system,Roboto,sans-serif;color:#cde}"+ "#op-aspect-legend .al-h{font:600 11px -apple-system,Roboto,sans-serif;color:#eaf;margin-bottom:7px;text-align:center}"+ "#op-aspect-legend .al-wheel{position:relative;width:92px;height:92px;border-radius:50%;margin:0 auto}"+ "#op-aspect-legend .al-wheel b{position:absolute;font:700 10px -apple-system,Roboto,sans-serif;color:#fff;text-shadow:0 1px 2px #000}"+ "#op-aspect-legend .al-n{top:-1px;left:50%;transform:translateX(-50%)}#op-aspect-legend .al-s{bottom:-1px;left:50%;transform:translateX(-50%)}"+ "#op-aspect-legend .al-e{right:-2px;top:50%;transform:translateY(-50%)}#op-aspect-legend .al-w{left:-3px;top:50%;transform:translateY(-50%)}"
    + "#op-aspect-legend.show{display:block}"
    + ".op-wp{display:flex;flex-direction:column;align-items:center;pointer-events:auto;cursor:pointer}"
    + ".op-wp-edit{display:flex;flex-direction:column;gap:6px;min-width:180px}"
    + ".op-wp-edit input{padding:7px 10px;border:0;border-radius:10px;background:rgba(255,255,255,.95);font:13px -apple-system,Roboto,sans-serif}"
    + ".op-wp-edit-row{display:flex;gap:6px}"
    + ".op-wp-edit-row button{flex:1;padding:7px 0;border:0;border-radius:10px;font:600 12px -apple-system,Roboto,sans-serif;color:#fff}"
    + ".op-wp-edit-del{background:#b3402e}.op-wp-edit-save{background:#2e7d4f}"
    + ".op-wp-edit-note{font:10px -apple-system,Roboto,sans-serif;color:rgba(255,255,255,.55);text-align:center}"
    + ".maplibregl-popup-content{background:rgba(31,37,48,.92);border-radius:12px;padding:10px;box-shadow:0 2px 10px rgba(0,0,0,.4)}"
    + ".maplibregl-popup-anchor-bottom .maplibregl-popup-tip{border-top-color:rgba(31,37,48,.92)}"
    + ".maplibregl-popup-anchor-top .maplibregl-popup-tip{border-bottom-color:rgba(31,37,48,.92)}"
    + ".op-wp-pin{font-size:20px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}"
    + ".op-wp-lbl{font:600 10px -apple-system,Roboto,sans-serif;color:#fff;background:rgba(31,37,48,.86);padding:2px 6px;border-radius:8px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;margin-top:1px}"
    + "#op-wp-input{position:absolute;top:calc(var(--safe-top,0px) + 56px);left:50%;transform:translateX(-50%);z-index:11;display:none;width:60%;max-width:280px;padding:8px 12px;border:0;border-radius:18px;background:rgba(255,255,255,.95);font:14px -apple-system,Roboto,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.3)}"
    + "#op-wp-input.show{display:block}";
    var s=document.createElement("style"); s.textContent=css; document.head.appendChild(s);
  }
  function injectDOM(){
    var d=document.createElement("div"); d.innerHTML =
        '<div id="op-badge">…</div>'
      + '<div id="op-saved-chip"></div>'
      + '<div id="op-tools">'
      +   '<button id="op-route-btn" class="op-btn" disabled aria-label="Route"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17 Q 9 6 12 13 T 20 7"/><circle cx="4" cy="17" r="2.3" fill="currentColor" stroke="none"/><circle cx="20" cy="7" r="2.3" fill="currentColor" stroke="none"/></svg></button>'
      +   '<button id="op-draw" class="op-btn" disabled aria-label="Draw"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 L4 16 L15 5 L19 9 L8 20 Z"/><path d="M13 7 L17 11"/></svg></button>'
      +   '<button id="op-pin" class="op-btn" disabled aria-label="Pin"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21 C12 21 18 13.5 18 9 A6 6 0 1 0 6 9 C6 13.5 12 21 12 21 Z"/><circle cx="12" cy="9" r="2.3"/></svg></button>'
      +   '<button id="op-undo" class="op-btn" disabled aria-label="Undo"><svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M20 13.5a6.5 6.5 0 0 1-6.5 6.5H6v-2h7.5c2.5 0 4.5-2 4.5-4.5S16 9 13.5 9H7.83l3.08 3.09L9.5 13.5L4 8l5.5-5.5l1.42 1.41L7.83 7h5.67a6.5 6.5 0 0 1 6.5 6.5"/></svg></button>'
      +   '<button id="op-clear" class="op-btn" disabled>✕</button>'
      +   '<button id="op-save" class="op-btn op-save" disabled aria-label="Save"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M6 4h10l4 4v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2"/><path d="M10 14a2 2 0 1 0 4 0a2 2 0 1 0-4 0m4-10v4H8V4"/></svg></button>'
      +   '<button id="op-fly" class="op-btn" disabled aria-label="Fly"><svg width="24" height="24" viewBox="-1 -1 17 17" fill="none"><path fill="currentColor" transform="rotate(45 7.5 7.5)" d="M6.82.68H4.77c-.68 0-.68-.68 0-.68h5.45c.68 0 .68.68 0 .68H8.18S9 1.27 9 2.63V4h6v2L9 8l-.5 5l2.5 1.32V15H4v-.68L6.5 13L6 8L0 6V4h6V2.64c0-1.37.82-1.96.82-1.96"/></svg></button>'
      +   '<button id="op-offline" class="op-btn" disabled aria-label="Download for offline">⬇</button>'
      + '</div>'
      + '<div id="op-aspect-legend"></div>'
      + '<div id="op-hint">Draw from the line\u2019s end \u00b7 drag elsewhere to move</div>'
      + '<input id="op-wp-input" placeholder="Waypoint label — then tap the map"/>'
      + '<div id="op-oob">Outside LiDAR coverage — no accurate slope here</div>'
      + '<div id="op-dock">'
      +   '<div id="op-summary"></div>'
      +   '<svg id="op-prof" viewBox="0 0 800 74" preserveAspectRatio="none"></svg>'
      +   '<div id="op-disc">Slope, aspect &amp; elevation reflect terrain geometry (LiDAR DEM) only — not snow conditions or avalanche risk.</div>'
      + '</div>';
    while(d.firstChild) document.body.appendChild(d.firstChild);
  }

  async function loadElev(){
    try{
      var bmp = await createImageBitmap(await (await fetch(art("elev_5m.png"))).blob());
      var cv=document.createElement("canvas"); cv.width=bmp.width; cv.height=bmp.height;
      var cx=cv.getContext("2d",{willReadFrequently:true}); cx.imageSmoothingEnabled=false; cx.drawImage(bmp,0,0);
      elevImg={data:cx.getImageData(0,0,bmp.width,bmp.height).data,W:bmp.width,H:bmp.height,b:meta.bounds_3857};
      ready=true; el.draw.disabled=false; if(el.aspect) el.aspect.disabled=false; if(el.pin) el.pin.disabled=false; if(el.routeBtn) el.routeBtn.disabled=false;
      // Offline serving currently works only on Android (shouldInterceptRequest);
      // iOS WKWebView can't intercept https+fetch, so hide the button there.
      if(el.offline){ if(window.AndroidOffpiste && window.AndroidOffpiste.onCacheResort){ el.offline.disabled=false; } else { el.offline.style.display="none"; } }
    }catch(e){ console.log("op elev load failed", e); }
  }
  function sampleElev(lng,lat){
    if(!elevImg) return null;
    var d=elevImg.data, W=elevImg.W, H=elevImg.H, b=elevImg.b;
    var px=Math.round((lon2mx(lng)-b[0])/(b[2]-b[0])*(W-1));
    var py=Math.round((b[3]-lat2my(lat))/(b[3]-b[1])*(H-1));
    if(px<0||py<0||px>=W||py>=H) return null;
    var p=(py*W+px)*4;
    if(d[p+3]===0) return null;
    return (d[p]*65536+d[p+1]*256+d[p+2])/10 - 10000;
  }

  function renderBadge(){
    var nat = meta.native_res_m || meta.res_m || 30;    // honest source resolution
    var lidar = nat <= 5;                                // 2.5/5m regional = LiDAR; 10m TINITALY / 30m Terrarium = est
    var tag = lidar ? '<span class="l">LiDAR '+nat+'m</span>'
                    : '<span class="e">'+nat+'m est · reference only</span>';
    var depthLine = "";
    if(depthInfo){
      var dp=[];
      if(depthInfo.top_cm!=null) dp.push("Top "+depthInfo.top_cm+"cm");
      if(depthInfo.mid_cm!=null) dp.push("Mid "+depthInfo.mid_cm+"cm");
      if(depthInfo.base_cm!=null) dp.push("Base "+depthInfo.base_cm+"cm");
      if(dp.length) depthLine = '<br><span class="op-snow">❄ '+dp.join(" · ")+(depthInfo.estimate?' est':'')+'</span>';
    }
    byId("op-badge").innerHTML = '<b>'+(meta.name||"Resort")+'</b> · '+tag
      + '<br><span style="opacity:.75">'+(meta.dem_source||"DEM")+'</span>' + depthLine;
  }

  function toggle(){
    if(!ready) return;
    active=!active;
    if(active && pinMode) togglePin();   // draw and pin modes are mutually exclusive
    el.draw.classList.toggle("on",active);

                       ["slope", "slope", "slope_5m.png", 0.72, "none"],
                       ["extreme", "extreme", "extreme_5m.png", 0.72, "none"]];
  // Per-resort drape-tile extents for the request router: the tiles/{hill,slope,
  // extreme} trees are emitted with a tile-CENTRE-in-bounds test, but MapLibre
  // requests every tile INTERSECTING the source bounds — the edge ring (centre
  // outside, extent overlapping) 400s and MapLibre re-requests it on every
  // move: log spam, battery, and map.loaded() never settles. The router below
  // answers those ring tiles with a transparent 1×1 PNG instead.
  const drapeExtents = {};   // rid -> bounds_3857
  const TRANSPARENT_TILE = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR4nGNgYGBgAAAABQABpfZFQAAAAABJRU5ErkJggg==";
  function drapeSpec(tag, m, b, baseUrl) {
    const sln = (m.safety_native && m.safety_native.layers) || {};
    const tiles = m.safety_native && m.safety_native.tiles;   // {minzoom,maxzoom,tree,bounds}
    const artFn = f => baseUrl + f + "?v=" + VER;
    const sources = {}, layers = [];
    const mkLayer = (id, vis, op) => ({ id, type: "raster", source: id,
      ...(vis === "none" ? { layout: { visibility: "none" } } : {}), paint: { "raster-opacity": op } });
    const box = (x0, x1, y0, y1) => { const w = m2lon(x0), e = m2lon(x1), n = m2lat(y1), s = m2lat(y0);
      return [[w, n], [e, n], [e, s], [w, s]]; };
    if (tiles) {
      // The drape tiler emits tiles whose CENTRE lies in the tight real-data
      // extent (dem_tiles.core_bounds); the padded grid bbox (bounds_3857) is
      // ~100 m looser and lets edge-ring requests through to 400s.
      const ext = (m.dem_tiles && m.dem_tiles.core_bounds) || b;
      const rm = baseUrl.match(/terrain_offpiste_v1\/([^/]+)\//);
      if (rm && ext) drapeExtents[rm[1]] = ext;
    }
    // Backcountry (bc-*) artifacts bake slope/extreme only when the source is a
    // safety-grade DTM (meta.wrote_slope_extreme) and never a hillshade_5m (the
    // dynamic demshade layer does the shading) — skip absent kinds instead of
    // letting their image fetches 400.
    const isBC = !!m.destination_id;
    DRAPE_KINDS.forEach(([kind, key, def, op, vis]) => {
      if (isBC && (kind === "hill" || !m.wrote_slope_extreme)) return;
      const id0 = tag ? kind + tag : kind;
      if (tiles) {   // hillshade + slope + cliff all as XYZ RasterTileSources (LOD, no clip)
        // bounds cut most off-coverage requests (meta value, else the resort's
        // own extent); the transformRequest router catches the edge ring.
        const srcBounds = tiles.bounds || (b ? [m2lon(b[0]), m2lat(b[1]), m2lon(b[2]), m2lat(b[3])] : null);
        sources[id0] = { type: "raster", tileSize: 256,
          tiles: [baseUrl + (tiles.tree || "tiles") + "/" + kind + "/{z}/{x}/{y}.webp?v=" + VER],
          minzoom: tiles.minzoom, maxzoom: tiles.maxzoom, ...(srcBounds ? { bounds: srcBounds } : {}) };
      } else {       // legacy fallback: single image
        sources[id0] = { type: "image", url: artFn(sln[key] || def), coordinates: box(b[0], b[2], b[1], b[3]) };
      }
      layers.push(mkLayer(id0, vis, op));
      if (kind === "hill" && m.forest && m.forest.file) {
        // Forest canopy drape (CHM-derived, alpha = canopy density) — sits
        // ABOVE the hillshade, BELOW the slope/cliff safety overlays. Single
        // image over the resort extent (median 71 KB). Default ON with an
        // explicit user toggle (🌲 chip) — the toggle is a hard requirement.
        const fid = tag ? "forest" + tag : "forest";
        sources[fid] = { type: "image", url: artFn(m.forest.file),
                         coordinates: box(b[0], b[2], b[1], b[3]) };
        layers.push({ id: fid, type: "raster", source: fid,
                      paint: { "raster-opacity": 0.55, "raster-fade-duration": 0 } });
      }
    });
    return { sources, layers };
  }
  // Degraded (no LiDAR): no hillshade/slope/cliff drape at all — the mesh +
  // OSM lines carry the preview; we deliberately show no computed overlay.
  const focDrape = degraded ? { sources: {}, layers: [] }
                            : drapeSpec("", meta, meta.bounds_3857, BASE);

  const map = new maplibregl.Map({
    container: "map",
    transformRequest: routeDem,
    center: [(w + e_) / 2, (s + n) / 2],
    zoom: 12.6, pitch: 66, bearing: 15,
    maxPitch: 85, attributionControl: true,   // 85 = MapLibre's hard ceiling for looking up
    // CJK slope/lift names render from the device font — the glyph server
    // only has to cover Latin/Cyrillic ranges.
    localIdeographFontFamily: "sans-serif",
    style: {
      version: 8,
      glyphs: "https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf",
      sources: {
        dem: { type: "raster-dem",
               tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
               tileSize: 256, encoding: "terrarium", maxzoom: 15,
               attribution: "Mapzen Terrain (AWS) · " + (meta.attribution || "") },
        // Same keyless vector source the Android 2D basemap uses — here
        // only for water so sea/river/lake read against the snow palette.
        ofm: { type: "vector", url: "https://tiles.openfreemap.org/planet",
               attribution: "© OpenStreetMap contributors · OpenFreeMap" },
        ...focDrape.sources,   // hillshade/slope/cliff — single image, or pieces if oversized
        contours:{ type: "geojson", data: meta.destination_id ? { type: "FeatureCollection", features: [] } : art("contours.json") },   // bc-* has none baked (v1); exists for non-LiDAR resorts too (Terrarium-baked, reference-only)
        geometry:{ type: "geojson", data: { type: "FeatureCollection", features: [] } },
        nearby:  { type: "geojson", data: nearbyGeo }
      },
      layers: [
        { id: "bg", type: "background", paint: { "background-color": "#EAF0F5" } },
        { id: "demshade", type: "hillshade", source: "dem",
          paint: { "hillshade-exaggeration": 0.35, "hillshade-shadow-color": "#3F5168",
                   "hillshade-highlight-color": "#FFFFFF" } },
        { id: "water", type: "fill", source: "ofm", "source-layer": "water",
          paint: { "fill-color": "#3F86B0", "fill-opacity": 0.85 } },
        { id: "waterway", type: "line", source: "ofm", "source-layer": "waterway",
          paint: { "line-color": "#3F86B0", "line-opacity": 0.9,
                   "line-width": ["interpolate", ["linear"], ["zoom"], 11, 1, 15, 3] } },
        ...focDrape.layers,   // hill visible; slope/cliff opt-in OFF (single image or pieces)
        { id: "c100", type: "line", source: "contours",
          filter: ["==", ["get", "cls"], "major"],
          paint: { "line-color": "#38485C", "line-width": 1.2, "line-opacity": 0.45 } },
        { id: "c50", type: "line", source: "contours", minzoom: 13,
          filter: ["==", ["get", "cls"], "mid"],
          paint: { "line-color": "#38485C", "line-width": 0.9, "line-opacity": 0.35 } },
        { id: "lifts", type: "line", source: "geometry",
          filter: ["has", "aerialway"],
          paint: { "line-color": "#2A2F38", "line-width": 2, "line-dasharray": [1.5, 1.5] } },
        { id: "pistes", type: "line", source: "geometry",
          filter: ["any", ["has", "piste:type"], ["has", "piste:difficulty"]],
          layout: { "line-cap": "round", "line-join": "round" },
          paint: {
            "line-color": ["match", ["string", ["get", "piste:difficulty"], ""],
              "novice", "#2BAA52", "easy", "#2870C9", "intermediate", "#D72D27",
              "advanced", "#1F2530", "expert", "#05070A", "#8A94A0"],
            "line-width": 2.4, "line-opacity": 0.95 } },
        { id: "piste-labels", type: "symbol", source: "geometry", minzoom: 12.5,
          filter: ["all", ["has", "name"],
                          ["any", ["has", "piste:type"], ["has", "piste:difficulty"]]],
          // "line" (not line-center): the name repeats along the run every
          // symbol-spacing px, so wherever you pan/zoom a label stays on screen —
          // line-center pins a single label to the midpoint, which scrolls off
          // when zoomed in. Viewport-aligned so each repeat is a billboard that
          // faces the camera and stays upright instead of lying flat along the
          // pitched run. MapLibre lifts symbols onto the terrain surface under 3D
          // terrain, so no explicit elevation is needed.
          layout: { "symbol-placement": "line", "symbol-spacing": 220,
                    "text-field": NAME,
                    "text-font": ["Noto Sans Bold"], "text-size": 11, "text-padding": 4,
                    "text-rotation-alignment": "viewport", "text-pitch-alignment": "viewport" },
          paint: { "text-color": "#1F2937", "text-halo-color": "#FFFFFF",
                   "text-halo-width": 1.5 } },
        { id: "lift-labels", type: "symbol", source: "geometry", minzoom: 12,
          filter: ["all", ["has", "name"], ["has", "aerialway"]],
          // "line" repeats along the lift so a label stays on screen when zoomed
          // in; viewport-aligned billboards face the camera and stay upright.
          layout: { "symbol-placement": "line", "symbol-spacing": 240,
                    "text-field": NAME,
                    "text-font": ["Noto Sans Regular"], "text-size": 10.5,
                    "text-offset": [0, -0.9], "text-padding": 4,
                    "text-rotation-alignment": "viewport", "text-pitch-alignment": "viewport" },
          paint: { "text-color": "#2A2F38", "text-halo-color": "#FFFFFF",
                   "text-halo-width": 1.4 } },
        { id: "nearby-dots", type: "circle", source: "nearby",
          paint: { "circle-radius": 4, "circle-color": "#FFFFFF",
                   "circle-stroke-color": "#1F6FA8", "circle-stroke-width": 2 } },
        { id: "nearby-names", type: "symbol", source: "nearby",
          layout: { "text-field": ["get", "name"], "text-font": ["Noto Sans Bold"],
                    "text-size": 12, "text-anchor": "top",
                    "text-offset": [0, 0.6], "text-padding": 4 },
          paint: { "text-color": "#1F6FA8", "text-halo-color": "#FFFFFF",
                   "text-halo-width": 1.6 } }
      ]
    }
  });
  // 2D compass: visualizePitch OFF so the needle stays flat (bearing only) and
  // readable. visualizePitch:true tilts the compass back with the camera pitch,
  // making it lie down and hard to read in 3D.
  map.addControl(new maplibregl.NavigationControl({ visualizePitch: false }));
  map.on("error", ev => {
    if (ev && ev.error) console.log("map error", ev.error.message || String(ev.error));
  });

  // Elevation sampler shared beyond the summit IIFE (frozen-tarn detection);
  // set once detectSummit succeeds, null for degraded resorts.
  let elevSampler = null;

  // Resort name: preferred placement is a pin hovering over the summit
  // (markers are terrain-aware, so it rides the 3D surface); the static
  // top-center chip is only the fallback when detection fails. The name
  // itself prefers the host-resolved localized pick (app language →
  // English → native) over meta.json's catalog name.
  (async () => {
    const hostRaw = (document.getElementById("hostname").textContent || "").trim();
    const displayName = (hostRaw && !hostRaw.startsWith("__") ? hostRaw : meta.name) || "";
    if (!displayName) return;
    const summit = degraded ? null : await detectSummit();   // no elev_5m in degraded → top-center title chip
    if (summit && summit.sample) elevSampler = summit.sample;
    if (!summit) {
      const t = document.getElementById("title");
      t.textContent = displayName;
      t.style.display = "block";
      return;
    }
    const el = document.createElement("div");
    el.className = "peak-wrap";
    const bob = document.createElement("div");
    bob.className = "peak-bob";
    const chip = document.createElement("div");
    chip.className = "peak-chip";
    chip.textContent = displayName;
    const pe = document.createElement("span");
    pe.className = "pe";
    pe.textContent = Math.round(summit.elev) + " m";
    chip.appendChild(pe);
    const tail = document.createElement("div");
    tail.className = "peak-tail";
    bob.appendChild(chip);
    bob.appendChild(tail);
    const dot = document.createElement("div");
    dot.className = "peak-dot";
    el.appendChild(bob);
    el.appendChild(dot);
    new maplibregl.Marker({ element: el, anchor: "bottom" })
      .setLngLat([summit.lon, summit.lat])
      .addTo(map);
    console.log("summit pin", summit.lon.toFixed(5), summit.lat.toFixed(5),
                Math.round(summit.elev) + "m");

    // Face the mountain: once the first render settles, swing the camera to
    // look from the base area up toward the summit — the angle a paper trail
    // map is drawn from. Skipped the moment the user touches the map (never
    // fight an interacting user); degraded resorts (no summit) never get here.
    if (summit.baseLon != null) {
      let userMoved = false;
      ["mousedown", "touchstart", "wheel"].forEach(ev =>
        map.getCanvas().addEventListener(ev, () => { userMoved = true; }, { once: true, passive: true }));
      const face = () => {
        if (userMoved) return;
        // Base = lowest-elevation PISTE vertex (bottom of the runs); fall back
        // to the lowest inside pixel when geometry/sampling yields nothing.
        let bLon = summit.baseLon, bLat = summit.baseLat, lo = Infinity;
        try {
          const geo = map.getSource("geometry") && map.getSource("geometry")._data;
          (geo && geo.features || []).forEach(f => {
            const p = f.properties || {};
            if (!(p["piste:type"] || p["piste:difficulty"])) return;
            const walk = c => {
              if (c && typeof c[0] === "number") {
                const e = summit.sample(c[0], c[1]);
                if (e != null && e < lo) { lo = e; bLon = c[0]; bLat = c[1]; }
              } else if (Array.isArray(c)) c.forEach(walk);
            };
            walk(f.geometry && f.geometry.coordinates);
          });
        } catch (e) {}
        const dx = (summit.lon - bLon) * Math.cos((summit.lat + bLat) / 2 * Math.PI / 180);
        const dy = summit.lat - bLat;
        if (!dx && !dy) return;
        const target = Math.atan2(dx, dy) * 180 / Math.PI;
        // Shortest-path swing into the trail-map bearing (user spec 2026-07-11:
        // "최단 경로" — signed delta in (−180,180], never more than a half turn;
        // the earlier 360° pre-roll could reach ~715° and read as two spins).
        // rAF-driven so a user touch cancels mid-flight (userMoved, per frame).
        const start = map.getBearing();
        const total = ((((target - start) % 360) + 540) % 360) - 180;   // (−180,180]
        if (Math.abs(total) < 1) return;                                 // already facing it
        const T = 1200 + Math.abs(total) * 12, t0 = performance.now();   // ~1.2–3.4 s by arc
        const ease = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        const spin = now => {
          if (userMoved) return;
          const t = Math.min(1, (now - t0) / T);
          map.setBearing(start + total * ease(t));
          if (t < 1) requestAnimationFrame(spin);
        };
        requestAnimationFrame(spin);
        console.log("orbit+face bearing", target.toFixed(0),
                    lo < Infinity ? "(piste base " + Math.round(lo) + "m)" : "(pixel base)");
      };
      if (map.loaded()) face(); else map.once("idle", face);
    }
  })();

  // ---- Frozen alpine tarns (user spec 2026-07-11): a small high-altitude
  // water body reads as ICE in winter — restyle it white-blue AND drop a
  // thin-ice caution marker, instead of drawing summer-blue water under a red
  // run (the Mount Olympus case: real OSM tarn at 1,802 m crossed by a real
  // OSM run). Water polygons come from the OFM vector tiles in view; altitude
  // from the LiDAR artifact inside the resort (elevSampler), else the mesh.
  const FROZEN_MIN_ELEV = 1400;          // m — plausible mid-winter freeze line for ski latitudes
  const FROZEN_MAX_AREA_M2 = 120000;     // only tarns/ponds; big lakes stay open water
  const frozenIds = [], frozenSeen = new Set();
  const frozenPts = { type: "FeatureCollection", features: [] };
  function cautionIcon() {
    const c = document.createElement("canvas"); c.width = 44; c.height = 40;
    const t = c.getContext("2d");
    t.beginPath(); t.moveTo(22, 3); t.lineTo(41, 36); t.lineTo(3, 36); t.closePath();
    t.fillStyle = "#FFC93D"; t.fill(); t.lineWidth = 3; t.strokeStyle = "#20242B"; t.stroke();
    t.fillStyle = "#20242B"; t.fillRect(20, 12, 4, 12); t.fillRect(20, 28, 4, 4);
    return t.getImageData(0, 0, 44, 40);
  }
  function initFrozen() {
    if (map.getLayer("frozen-water")) return;
    map.addImage("ice-caution", cautionIcon(), { pixelRatio: 2 });
    // fill rides the SAME ofm tiles with an id filter — no geojson copy, so
    // tile-clipped fragments never double-draw or seam.
    map.addLayer({ id: "frozen-water", type: "fill", source: "ofm", "source-layer": "water",
      filter: ["in", ["id"], ["literal", []]],
      paint: { "fill-color": "#E8F1F7", "fill-opacity": 0.96 } }, "waterway");
    map.addSource("frozen-pts", { type: "geojson", data: frozenPts });
    map.addLayer({ id: "frozen-caution", type: "symbol", source: "frozen-pts",
      layout: { "icon-image": "ice-caution", "icon-size": 0.55,
                "icon-allow-overlap": true, "icon-ignore-placement": true } });
  }
  function markFrozenTarns() {
    try {
      initFrozen();
      let grew = false;
      map.querySourceFeatures("ofm", { sourceLayer: "water" }).forEach(f => {
        const id = f.id;
        if (id == null || frozenSeen.has(id)) return;
        const g = f.geometry; if (!g || g.type.indexOf("Polygon") < 0) return;
        const ring = (g.type === "Polygon" ? g.coordinates[0] : (g.coordinates[0] || [])[0]) || [];
        if (ring.length < 4) return;
        frozenSeen.add(id);
        let A = 0, sx = 0, sy = 0;
        for (let i = 0; i < ring.length - 1; i++) {
          A += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
          sx += ring[i][0]; sy += ring[i][1];
        }
        const cx = sx / (ring.length - 1), cy = sy / (ring.length - 1);
        // shoelace in degrees → m² (lon axis shrinks by cos(lat), applied once)
        const areaM2 = Math.abs(A / 2) * 111320 * 111320 * Math.cos(cy * Math.PI / 180);
        if (areaM2 > FROZEN_MAX_AREA_M2 || areaM2 < 400) return;
        let el = elevSampler ? elevSampler(cx, cy) : null;
        if (el == null) { try { el = map.queryTerrainElevation([cx, cy]); } catch (e) {} }
        if (el == null || el < FROZEN_MIN_ELEV) return;
        frozenIds.push(id); grew = true;
        frozenPts.features.push({ type: "Feature", properties: {},
          geometry: { type: "Point", coordinates: [cx, cy] } });
      });
      if (grew) {
        map.setFilter("frozen-water", ["in", ["id"], ["literal", frozenIds]]);
        map.getSource("frozen-pts").setData(frozenPts);
        console.log("frozen tarns:", frozenIds.length);
      }
    } catch (e) {}
  }
  map.on("idle", markFrozenTarns);

  // ---------- Forest v2: near-field billboard trees (canopy_10m.webp) ----------
  // User-approved look: minimal snow-capped fir. Far field keeps the v1 tint;
  // billboards spawn only within ~2 km of the camera (LOD, cap 5k) and are ONE
  // BODY with the 🌲 forest toggle (layer id "forest__trees" rides the same
  // kindVis prefix). Data: R=canopy height (0..250 ⇒ /5 m), G=density (25 m
  // window), A=inside mask — lossless webp baked per resort (meta.canopy).
  let canopyGrid = null;   // { d: Uint8ClampedArray, W, H, b: bounds_3857 }
  const treeState = { lastKey: "" };
  function treeSprite() {
    const c = document.createElement("canvas"); c.width = 48; c.height = 64;
    const t = c.getContext("2d");
    const tri = (cx, ay, w, h, col) => { t.fillStyle = col; t.beginPath();
      t.moveTo(cx, ay); t.lineTo(cx + w, ay + h); t.lineTo(cx - w, ay + h);
      t.closePath(); t.fill(); };
    tri(24, 6, 19, 46, "#336042");        // green body
    tri(24, 6, 10.5, 25, "#F2F7FB");      // snow cap (top ~54%)
    t.fillStyle = "#4a3826"; t.fillRect(21.2, 51, 5.6, 9);   // trunk
    return t.getImageData(0, 0, 48, 64);
  }
  async function loadCanopy() {
    if (canopyGrid !== null || !meta.canopy || degraded) return;
    canopyGrid = false;                    // in-flight / failed marker
    try {
      const blob = await (await fetch(art(meta.canopy.file || "canopy_10m.webp"))).blob();
      const bmp = await createImageBitmap(blob);
      const cv = document.createElement("canvas");
      cv.width = bmp.width; cv.height = bmp.height;
      const cx = cv.getContext("2d", { willReadFrequently: true });
      cx.imageSmoothingEnabled = false;    // data texture — never resample
      cx.drawImage(bmp, 0, 0);
      canopyGrid = { d: cx.getImageData(0, 0, bmp.width, bmp.height).data,
                     W: bmp.width, H: bmp.height, b: meta.bounds_3857 };
      regenTrees();
    } catch (e) { console.log("canopy skipped", e); }
  }
  function regenTrees() {
    if (!canopyGrid || canopyGrid === false) return;
    const z = map.getZoom();
    const key = z < 13 ? "off"
      : [map.getCenter().lng.toFixed(3), map.getCenter().lat.toFixed(3), (z | 0)].join("|");
    if (key === treeState.lastKey) return;
    treeState.lastKey = key;
    const fc = { type: "FeatureCollection", features: [] };
    if (key !== "off") {
      const { d, W, H, b } = canopyGrid;
      const sx = (b[2] - b[0]) / W, sy = (b[3] - b[1]) / H;
      const c0 = map.getCenter();
      const cmx = lon2m(c0.lng), cmy = lat2m(c0.lat), R2 = 2000;
      const cA = Math.max(0, Math.floor((cmx - R2 - b[0]) / sx));
      const cB = Math.min(W - 1, Math.ceil((cmx + R2 - b[0]) / sx));
      const rA = Math.max(0, Math.floor((b[3] - (cmy + R2)) / sy));
      const rB = Math.min(H - 1, Math.ceil((b[3] - (cmy - R2)) / sy));
      outer:
      for (let r = rA; r <= rB; r++) {
        for (let c = cA; c <= cB; c++) {
          const o = (r * W + c) * 4;
          const hR = d[o];                       // canopy height 0..250
          if (hR === 0 || d[o + 3] === 0) continue;
          const dens = d[o + 1] / 255;
          const j = ((c * 7919 + r * 104729) % 1000) / 1000;
          if (j > dens * 0.55 + 0.03) continue;  // isolated big trees survive
          const j2 = ((c * 31337 + r * 271) % 1000) / 1000;
          const mx = b[0] + (c + 0.2 + j2 * 0.6) * sx;
          const my = b[3] - (r + 0.2 + j * 0.6) * sy;
          fc.features.push({ type: "Feature",
            properties: { s: 0.22 + (hR / 5 / 30) * 1.05 },
            geometry: { type: "Point", coordinates: [m2lon(mx), m2lat(my)] } });
          if (fc.features.length >= 5000) break outer;   // hard LOD cap
        }
      }
    }
    if (!map.getSource("forest__trees")) {
      map.addImage("forest-tree", treeSprite(), { pixelRatio: 2 });
      map.addSource("forest__trees", { type: "geojson", data: fc });
      // ⚠ icon-size zoom expression MUST be the top-level interpolate —
      // nesting it inside ["*"] makes MapLibre silently drop the layer
      // (measured by the accuracy session, no error raised).
      map.addLayer({ id: "forest__trees", type: "symbol", source: "forest__trees",
        minzoom: 13,
        layout: {

          "icon-pitch-alignment": "viewport", "icon-rotation-alignment": "viewport",
          "icon-allow-overlap": true, "icon-ignore-placement": true,

                        13, ["*", ["get", "s"], 0.35],

  // 2D/3D toggle — flattening the terrain helps reading dense trail networks.
  let terrainOn = true;

  // internal `meshSize`/`_mesh` fields to 256 for a sharper mesh, but that hack
  // doesn't regenerate MapLibre's tile-edge stitching → visible MESH CRACKS /
  // seams at tile boundaries (worse than the roundness it fixed). The 5 m core
  // DEM tiles still make the terrain sharper than the old 30 m source; the mesh

  const tbtn = document.getElementById("tbtn");

  const zbadge = document.getElementById("zbadge");
  const updZBadge = () => {
    if (!zbadge) return;
    const z = map.getZoom();
    // "5m" iff the CAMERA CENTRE is inside any registered core region (focused
    // OR an on-demand-loaded neighbour) — the old focused-only `hasCore` check
    // said "5m" over unloaded neighbours and "30m" over loaded ones.
    const c = map.getCenter();
    const cx = c.lng / 180 * WM;
    const cy = Math.log(Math.tan(Math.PI / 4 + c.lat * Math.PI / 360)) / Math.PI * WM;
    const inCore = coreRegions.some(cb => cx >= cb[0] && cx <= cb[2] && cy >= cb[1] && cy <= cb[3]);
    zbadge.innerHTML = "z" + Math.round(z) + " · <b>" + (inCore && z >= 13.5 ? "5m" : "30m") + "</b>";

  // matching layers ("slope" + "slope__<neighbourId>", etc.), and newly-loaded
  // neighbours adopt the current state (see kindVis in loadNeighbor).
  const kindVis = { slope: false, extreme: false, forest: true };   // forest: default ON (user-mandated explicit toggle)

    const btn = document.getElementById(btnID);

  (function () {

  // NASA Deep Star Maps texture (equirectangular, equatorial) on a Three.js
  // sphere behind the transparent MapLibre canvas, oriented for this resort's
  // latitude/longitude and the current time; zodiac constellation lines drawn
  // in the SAME coordinate frame so they always sit on their texture stars.
  //
  // Sky placement + camera BOTH derive from the same alt/az transform, so the
  // sky can't be mirrored or spun relative to the view — no orientation knobs
  // needed. Only the camera framing vs the terrain may want a nudge:
  //   PITCH_OFFSET_DEG / FOV_SCALE — align the sky horizon/zoom to the terrain.
  const PITCH_OFFSET_DEG = 0, FOV_SCALE = 1.0, SKY_R = 500;
  // DEPTH-OCCLUSION PROBE (verified true on device 2026-07-07): a depth-tested
  // sphere as a custom 3D layer got occluded by ridges → custom layers share
  // the terrain depth buffer, so the real sky is built the same way
  // (initSkyLayer). Flip to true to re-run the bare probe sphere.
  const PROBE_MODE = false;
  // TWO SEPARATE LAYERS now: a starless Milky-Way GLOW texture, and crisp
  // point STARS from a real catalog — so each is controlled independently and
  // the stars are pin-sharp (not limited by texture resolution).
  //
  // Milky-Way tone: the glow texture is dim (max lum ~0.15), so a big gain
  // lifts the core, then a power-curve mask (MW_POW) drops the faint wings into
  // darkness while a core boost keeps the bright band — verified render:
  // gain 6 / pow 1.5 / boost 0.6 / final 2.5. Raise MW_POW to shrink the band.
  const MW_BLACK = 0.03, MW_GAIN = 4.0, MW_POW = 1.6, MW_BOOST = 0.6, MW_FGAIN = 2.0;
  // Sky vertical compression (anisotropic projection). The sky is projected with
  // the SAME matrix/FOV as the terrain, so azimuth (horizontal) magnification
  // matches the ground exactly and the sky rotation LOCKS to the terrain — no more
  // stars sliding past the ridge silhouette when you rotate. Only the ALTITUDE is
  // remapped, non-linearly: alt' = atan(alt·SKY_VC)/SKY_VC — slope 1 at the horizon
  // (stars just above a ridge keep true 1:1 proportion, the only place the eye can
  // compare against terrain) and progressively squashed toward the top, so a taller
  // slice of sky (the Milky-Way band) still fits. Higher SKY_VC = more band fits +
  // more top squash; SKY_VC→0 = no compression (pure terrain-locked 37°).
  const SKY_VC = 3.0;
  const STAR_SIZE = 0.9, STAR_MAG_LIMIT = 6.6;   // point-star sizing knobs
  const OBS_LAT = (s + n) / 2, OBS_LON = (w + e_) / 2;
  const MILKYWAY = "https://ryiitcblrrqvjvxkobpf.supabase.co/storage/v1/object/public/ride-tracker-static/sky/milkyway_4k.jpg";
  const STARS_URL = "https://ryiitcblrrqvjvxkobpf.supabase.co/storage/v1/object/public/ride-tracker-static/sky/stars.json";

  const ZODIAC = [
    ["Aries",{a:[2.119,23.46],b:[1.911,20.81],g:[1.892,19.29]},[["a","b"],["b","g"]]],
    ["Taurus",{al:[4.599,16.51],be:[5.438,28.61],ga:[4.330,15.63],de:[4.382,17.54],ep:[4.477,19.18],la:[4.011,12.49],ze:[5.627,21.14]},[["la","ep"],["ep","de"],["de","ga"],["ga","al"],["al","ze"],["ze","be"]]],

    ["Cancer",{b:[8.275,9.19],d:[8.745,18.15],g:[8.721,21.47],a:[8.975,11.86],i:[8.778,28.76]},[["a","d"],["d","g"],["d","b"],["g","i"]]],
    ["Leo",{a:[10.139,11.97],b:[11.818,14.57],g:[10.333,19.84],d:[11.235,20.52],e:[9.764,23.77],z:[10.278,23.42],h:[10.122,16.76],t:[11.237,15.43]},[["a","h"],["h","g"],["g","z"],["z","e"],["g","d"],["d","b"],["b","t"],["t","a"]]],
    ["Virgo",{a:[13.420,-11.16],b:[11.845,1.76],g:[12.694,-1.45],d:[12.926,3.40],e:[13.036,10.96],z:[13.578,-0.60]},[["e","d"],["d","g"],["g","b"],["g","z"],["z","a"]]],
    ["Libra",{a:[14.848,-16.04],b:[15.283,-9.38],g:[15.592,-14.79],s:[15.067,-25.28]},[["a","b"],["b","g"],["g","a"],["a","s"]]],
    ["Scorpius",{b:[16.09,-19.81],d:[16.00,-22.62],pi:[15.98,-26.11],a:[16.49,-26.43],s:[16.35,-25.59],t:[16.60,-28.22],e:[16.84,-34.29],mu:[16.87,-38.05],z:[16.91,-42.36],et:[17.20,-43.24],th:[17.62,-42.99],i:[17.79,-40.13],k:[17.71,-39.03],l:[17.56,-37.10],u:[17.51,-37.30]},[["b","d"],["d","pi"],["d","a"],["a","s"],["s","t"],["t","e"],["e","mu"],["mu","z"],["z","et"],["et","th"],["th","i"],["i","k"],["k","l"],["l","u"]]],
    ["Sagittarius",{g:[18.10,-30.42],d:[18.35,-29.83],e:[18.40,-34.38],l:[18.47,-25.42],ph:[18.76,-26.99],si:[18.92,-26.30],ze:[19.04,-29.88],ta:[19.11,-27.67]},[["g","d"],["d","e"],["e","ze"],["ze","si"],["si","ph"],["ph","d"],["d","l"],["l","ph"],["si","ta"]]],
    ["Capricornus",{a:[20.30,-12.51],b:[20.35,-14.78],ps:[20.77,-25.27],om:[20.86,-26.92],z:[21.44,-22.41],g:[21.67,-16.66],d:[21.78,-16.13]},[["a","b"],["b","om"],["om","ps"],["ps","z"],["z","d"],["d","g"],["g","z"],["a","d"]]],
    ["Aquarius",{b:[21.526,-5.57],a:[22.096,-0.32],g:[22.361,-1.39],z:[22.481,-0.02],h:[22.585,-0.12],la:[22.877,-7.58],d:[22.911,-15.82]},[["b","a"],["a","g"],["g","z"],["z","h"],["a","la"],["la","d"]]],
    ["Pisces",{a:[2.033,2.76],et:[1.524,15.35],ga:[23.286,3.28],io:[23.666,5.63],om:[23.985,6.86],la:[23.699,1.78]},[["a","io"],["io","om"],["om","la"],["la","ga"],["a","et"]]]
  ];

  const D2R = Math.PI / 180;
  const jdUTC = d => d.getTime() / 86400000 + 2440587.5;
  const gmstDeg = d => (((280.46061837 + 360.98564736629 * (jdUTC(d) - 2451545.0)) % 360) + 360) % 360;
  function sunEq(d) {                             // low-precision solar RA/Dec (deg)
    const t = jdUTC(d) - 2451545.0;
    const g = (357.529 + 0.98560028 * t) * D2R;
    const q = 280.459 + 0.98564736 * t;
    const L = (q + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * D2R;
    const e = 23.439 * D2R;
    return { ra: ((Math.atan2(Math.cos(e) * Math.sin(L), Math.cos(L)) / D2R) + 360) % 360,
             dec: Math.asin(Math.sin(e) * Math.sin(L)) / D2R };
  }
  function eqToAltAz(raDeg, decDeg, lstDeg) {      // -> {alt,az} deg
    const ha = ((lstDeg - raDeg) % 360) * D2R, dec = decDeg * D2R, lat = OBS_LAT * D2R;
    const alt = Math.asin(Math.sin(dec) * Math.sin(lat) + Math.cos(dec) * Math.cos(lat) * Math.cos(ha));
    const az = Math.atan2(-Math.cos(dec) * Math.sin(ha),
                          Math.sin(dec) * Math.cos(lat) - Math.cos(dec) * Math.sin(lat) * Math.cos(ha));
    return { alt: alt / D2R, az: ((az / D2R) + 360) % 360 };
  }
  // Horizontal (alt/az) -> world vector. THREE Y-up; north=-Z, east=+X.
  function altAzVec(alt, az, r) {
    const a = alt * D2R, z = az * D2R, ca = Math.cos(a);
    return new THREE.Vector3(Math.sin(z) * ca, Math.sin(a), -Math.cos(z) * ca).multiplyScalar(r || 1);
  }
  // Equatorial (RA/Dec) -> WORLD horizontal vector for THIS resort + build time.
  // The texture-sphere vertices AND the constellation stars are placed with this
  // SAME transform, and the camera looks along horizontal (alt/az) too — so the
  // sky physically cannot be mirrored ("outside the dome" / reversed) relative to
  // the view. Baked once at load (LST drifts only ~15°/hr — fine for a preview).
  let SKY_LST = 0;
  function skyVec(raDeg, decDeg, r) {
    const p = eqToAltAz(raDeg, decDeg, SKY_LST);
    return altAzVec(p.alt, p.az, r);
  }

  // Auto day→night threshold: sun must be this far BELOW the horizon before the
  // sky reads as night (stars + darkened terrain). −6° = civil dusk (sky
  // genuinely darkening); the old +2° fired at sunset while it was still bright,
  // so stars showed in the evening/"day". Manual moon (forceNight) overrides.
  const NIGHT_ALT = -6;
  let forceNight = false, forceDay = false;   // sky override: cycle auto → night → day
  const setDbg = t => { const e = document.getElementById("dbg"); if (e) e.textContent = "sky: " + t; };
  // ENU direction (mercator-aligned: +x East, -y North [mercator y grows
  // south], +z Up) for a star at RA/Dec, using the baked sidereal time.
  function skyDir(raDeg, decDeg) {
    const p = eqToAltAz(raDeg, decDeg, SKY_LST);
    const a = p.alt * D2R, z = p.az * D2R, ca = Math.cos(a);
    return [Math.sin(z) * ca, -Math.cos(z) * ca, Math.sin(a)];
  }

  // Star colour from B-V colour index (ci): blue (hot) → white → yellow →
  // orange (cool). A rough but pleasing blackbody-ish gradient.
  const CI_STOPS = [[-0.4, [0.62, 0.72, 1.0]], [0.0, [0.82, 0.88, 1.0]],
    [0.4, [1.0, 1.0, 1.0]], [0.8, [1.0, 0.94, 0.82]],
    [1.4, [1.0, 0.82, 0.62]], [2.0, [1.0, 0.72, 0.52]]];
  function ciColor(ci) {
    if (ci <= CI_STOPS[0][0]) return CI_STOPS[0][1];
    for (let i = 0; i < CI_STOPS.length - 1; i++) {
      if (ci <= CI_STOPS[i + 1][0]) {
        const f = (ci - CI_STOPS[i][0]) / (CI_STOPS[i + 1][0] - CI_STOPS[i][0]);
        const a = CI_STOPS[i][1], b = CI_STOPS[i + 1][1];
        return [a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f, a[2] + (b[2] - a[2]) * f];
      }
    }
    return CI_STOPS[CI_STOPS.length - 1][1];
  }

  function isNightNow() {
    const now = new Date(), lst = (gmstDeg(now) + OBS_LON) % 360;
    const su = sunEq(now), sp = eqToAltAz(su.ra, su.dec, lst);
    return forceNight || (!forceDay && sp.alt < NIGHT_ALT);
  }

  // Darken the basemap (sky bg, water, terrain relief) at night so the scene
  // reads as one coherent night instead of daylit snow under a starfield.
  function applyHillNight(night) {   // every hillshade drape: focused "hill" + "hill__<neighbour>"
    map.getStyle().layers.forEach(L => {
      if (L.id === "hill" || L.id.indexOf("hill__") === 0) {
        map.setPaintProperty(L.id, "raster-opacity", night ? 0.6 : 0.9);
        map.setPaintProperty(L.id, "raster-brightness-max", night ? 0.9 : 1.0);
      }
      // Forest canopy dims harder at night — moonlit forest reads as a shadow,
      // not a green wash (same focused+neighbour prefix convention). The v2
      // billboard layer is a SYMBOL, so it dims via icon-opacity instead.
      if (L.id === "forest" || L.id.indexOf("forest__") === 0) {
        if (L.type === "raster") {
          map.setPaintProperty(L.id, "raster-opacity", night ? 0.25 : 0.55);
        } else if (L.type === "symbol") {
          map.setPaintProperty(L.id, "icon-opacity", night ? 0.65 : 1.0);
        }
      }
    });
  }
  let _nightStyle = null;
  function applyNightStyle() {
    const night = isNightNow();
    if (_nightStyle === night) return;
    _nightStyle = night;
    const P = (layer, prop, val) => { if (map.getLayer(layer)) map.setPaintProperty(layer, prop, val); };
    if (night) {
      P("bg", "background-color", "#1a2636");
      P("water", "fill-color", "#1c3450");
      P("waterway", "line-color", "#1c3450");
      P("demshade", "hillshade-shadow-color", "#243545");
      P("demshade", "hillshade-highlight-color", "#7089a8");   // brighter moonlit snow
    } else {
      P("bg", "background-color", "#EAF0F5");
      P("water", "fill-color", "#3F86B0");
      P("waterway", "line-color", "#3F86B0");
      P("demshade", "hillshade-shadow-color", "#3F5168");
      P("demshade", "hillshade-highlight-color", "#FFFFFF");
    }
    applyHillNight(night);   // dims ALL hillshade drapes (focused + neighbours)
  }

  // Night sky as a MapLibre custom 3D layer (the probe proved custom layers
  // share the terrain depth buffer). The star sphere + zodiac are drawn in
  // MapLibre's OWN GL context with its OWN camera matrix as a TRUE infinite
  // skybox (vertices are directions at infinity, w=0, so translation drops
  // out — correct at any position/zoom, no camera lookup), forced to the far
  // depth plane (gl_Position.xyww) so ridges occlude them.
  function initSkyLayer() {
    SKY_LST = (gmstDeg(new Date()) + OBS_LON) % 360;
    const NLAT = 48, NLON = 96, sdir = [], suv = [], sidx = [];
    for (let i = 0; i <= NLAT; i++) {
      const dec = 90 - (i / NLAT) * 180;
      for (let j = 0; j <= NLON; j++) {
        const ra = (j / NLON) * 360, d = skyDir(ra, dec);
        sdir.push(d[0], d[1], d[2]); suv.push(ra / 360, (dec + 90) / 180);
      }
    }
    for (let i = 0; i < NLAT; i++) for (let j = 0; j < NLON; j++) {
      const a = i * (NLON + 1) + j, b = a + NLON + 1;
      sidx.push(a, b, a + 1, b, b + 1, a + 1);
    }
    const ldir = [], pdir = [];
    ZODIAC.forEach(([name, stars, lines]) => {
      const dm = {};
      for (const id in stars) { const d = skyDir(stars[id][0] * 15, stars[id][1]); dm[id] = d; pdir.push(d[0], d[1], d[2]); }
      lines.forEach(([x, y]) => { if (dm[x] && dm[y]) ldir.push(dm[x][0], dm[x][1], dm[x][2], dm[y][0], dm[y][1], dm[y][2]); });
    });

    const layer = {
      id: "night-sky", type: "custom", renderingMode: "3d",
      onAdd(m, gl) {
        // True infinite skybox: vec4(dir, 0.0) is a point at infinity, so the
        // matrix's translation drops out — sky depends ONLY on camera rotation.
        // skyRemap: shared altitude compression (anisotropic sky projection).
        // Azimuth is passed straight through so the sky sweeps with the terrain
        // when you rotate (horizontal lock); altitude is squashed toward the top
        // (see SKY_VC). Everything projects with the terrain matrix + xyww so
        // ridges still occlude the sky at the far plane.
        const SKY_REMAP =
          "vec3 skyRemap(vec3 d, float vc){" +
          " float alt = asin(clamp(d.z, -1.0, 1.0)); float az = atan(d.x, -d.y);" +
          " float a2 = (vc > 0.001) ? atan(alt * vc) / vc : alt; float ca = cos(a2);" +
          " return vec3(sin(az) * ca, -cos(az) * ca, sin(a2)); }";
        const vsTex =
          "attribute vec3 a_dir; attribute vec2 a_uv; uniform mat4 u_matrix; uniform float u_vc;" +
          SKY_REMAP +
          "varying vec2 v_uv; void main(){ v_uv = a_uv; vec4 p = u_matrix * vec4(skyRemap(a_dir, u_vc), 0.0); gl_Position = p.xyww; }";
        // Milky-Way glow: lift the dim texture, then a power-curve mask drops
        // the faint wings into darkness while a core boost keeps the bright
        // band (approach 1+2); warm core / cool outer tint (approach 4).
        const fsTex =
          "precision mediump float; uniform sampler2D u_tex; uniform float u_black,u_gain,u_pow,u_boost,u_fgain; varying vec2 v_uv;" +
          "void main(){ vec3 c = texture2D(u_tex, v_uv).rgb;" +
          " c = clamp((c-u_black)/(1.0-u_black),0.0,1.0)*u_gain;" +
          " float lum = dot(c, vec3(0.299,0.587,0.114));" +
          " float mask = pow(clamp(lum,0.0,1.0), u_pow) + smoothstep(0.4,0.8,lum)*u_boost;" +
          " c = c * mask * u_fgain;" +
          " c *= mix(vec3(0.85,0.93,1.12), vec3(1.1,1.0,0.82), smoothstep(0.1,0.5,lum));" +
          " gl_FragColor = vec4(clamp(c,0.0,1.0),1.0); }";
        const vsFlat =
          "attribute vec3 a_dir; uniform mat4 u_matrix; uniform float u_vc, u_size;" +
          SKY_REMAP +
          "void main(){ vec4 p = u_matrix * vec4(skyRemap(a_dir, u_vc), 0.0); gl_Position = p.xyww; gl_PointSize = u_size; }";
        const fsFlat =
          "precision mediump float; uniform vec4 u_color; uniform float u_round;" +
          "void main(){ if (u_round > 0.5) { vec2 q = gl_PointCoord - 0.5; if (dot(q,q) > 0.25) discard; } gl_FragColor = u_color; }";
        // Catalogue stars: per-vertex size (by magnitude) + colour (by B-V),
        // round soft points, additive so they glow and never look flat.
        const vsStar =
          "attribute vec3 a_dir; attribute float a_size; attribute vec3 a_col; uniform mat4 u_matrix; uniform float u_vc, u_ps;" +
          SKY_REMAP +
          "varying vec3 v_col; void main(){ vec4 p = u_matrix * vec4(skyRemap(a_dir, u_vc), 0.0); gl_Position = p.xyww; gl_PointSize = a_size * u_ps; v_col = a_col; }";
        const fsStar =
          "precision mediump float; varying vec3 v_col; void main(){ vec2 q = gl_PointCoord - 0.5; float d = dot(q,q); if (d > 0.25) discard; float a = smoothstep(0.25, 0.0, d); gl_FragColor = vec4(v_col * a, a); }";
        // Day sky: a gradient dome (deep-blue zenith → pale horizon, warm near
        // the sun) coloured per fragment by altitude (a_dir.z = sin(alt)) and the
        // angle to the sun. u_day dims/warms it through twilight. Same infinite-
        // skybox vertices as the night sphere, so ridges occlude it identically.
        const vsDay =
          "attribute vec3 a_dir; uniform mat4 u_matrix; uniform float u_vc;" +
          SKY_REMAP +
          "varying vec3 v_dir; void main(){ v_dir = a_dir; vec4 p = u_matrix * vec4(skyRemap(a_dir, u_vc), 0.0); gl_Position = p.xyww; }";
        const fsDay =
          "precision mediump float; uniform vec3 u_sun; uniform float u_day; varying vec3 v_dir;" +
          "void main(){ vec3 d = normalize(v_dir); float up = clamp(d.z, 0.0, 1.0);" +
          " vec3 zen = mix(vec3(0.10,0.16,0.34), vec3(0.24,0.49,0.84), u_day);" +
          " vec3 hor = mix(vec3(0.42,0.36,0.40), vec3(0.80,0.88,0.96), u_day);" +
          " vec3 sky = mix(hor, zen, pow(up, 0.5)); float c = max(dot(d, u_sun), 0.0);" +
          " sky += vec3(1.0,0.85,0.60) * pow(c, 8.0) * (0.30 + (1.0 - u_day) * 0.55);" +
          " sky = mix(sky, vec3(1.0,0.96,0.86), pow(c, 200.0) * 0.85);" +
          " gl_FragColor = vec4(clamp(sky, 0.0, 1.0), 1.0); }";
        const cs = (t, s) => { const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh); if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) console.log("sky shader", gl.getShaderInfoLog(sh)); return sh; };
        const prog = (v, f) => { const p = gl.createProgram(); gl.attachShader(p, cs(gl.VERTEX_SHADER, v)); gl.attachShader(p, cs(gl.FRAGMENT_SHADER, f)); gl.linkProgram(p); return p; };
        this.pTex = prog(vsTex, fsTex); this.pFlat = prog(vsFlat, fsFlat); this.pStar = prog(vsStar, fsStar);
        this.pDay = prog(vsDay, fsDay);
        const buf = (arr, tp) => { const b = gl.createBuffer(); gl.bindBuffer(tp || gl.ARRAY_BUFFER, b); gl.bufferData(tp || gl.ARRAY_BUFFER, arr, gl.STATIC_DRAW); return b; };
        this.sDir = buf(new Float32Array(sdir)); this.sUv = buf(new Float32Array(suv));
        this.sIdx = buf(new Uint16Array(sidx), gl.ELEMENT_ARRAY_BUFFER); this.sCount = sidx.length;
        this.lDir = buf(new Float32Array(ldir)); this.lCount = ldir.length / 3;
        this.pPts = buf(new Float32Array(pdir)); this.pCount = pdir.length / 3;
        this.tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, this.tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([8, 10, 18, 255]));
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        const img = new Image(); img.crossOrigin = "anonymous";
        img.onload = () => { gl.bindTexture(gl.TEXTURE_2D, this.tex); gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img); gl.generateMipmap(gl.TEXTURE_2D); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR); this._texReady = true; map.triggerRepaint(); };
        img.onerror = () => { this._texErr = true; setDbg("TEXTURE LOAD FAILED (CORS?)"); };
        img.src = MILKYWAY;
        this.T = { m: gl.getUniformLocation(this.pTex, "u_matrix"), sc: gl.getUniformLocation(this.pTex, "u_vc"), tx: gl.getUniformLocation(this.pTex, "u_tex"), bk: gl.getUniformLocation(this.pTex, "u_black"), gn: gl.getUniformLocation(this.pTex, "u_gain"), pw: gl.getUniformLocation(this.pTex, "u_pow"), bo: gl.getUniformLocation(this.pTex, "u_boost"), fg: gl.getUniformLocation(this.pTex, "u_fgain"), dir: gl.getAttribLocation(this.pTex, "a_dir"), uv: gl.getAttribLocation(this.pTex, "a_uv") };
        this.F = { m: gl.getUniformLocation(this.pFlat, "u_matrix"), sc: gl.getUniformLocation(this.pFlat, "u_vc"), col: gl.getUniformLocation(this.pFlat, "u_color"), sz: gl.getUniformLocation(this.pFlat, "u_size"), rd: gl.getUniformLocation(this.pFlat, "u_round"), dir: gl.getAttribLocation(this.pFlat, "a_dir") };
        this.S = { m: gl.getUniformLocation(this.pStar, "u_matrix"), sc: gl.getUniformLocation(this.pStar, "u_vc"), ps: gl.getUniformLocation(this.pStar, "u_ps"), dir: gl.getAttribLocation(this.pStar, "a_dir"), size: gl.getAttribLocation(this.pStar, "a_size"), col: gl.getAttribLocation(this.pStar, "a_col") };
        this.D = { m: gl.getUniformLocation(this.pDay, "u_matrix"), sc: gl.getUniformLocation(this.pDay, "u_vc"), sun: gl.getUniformLocation(this.pDay, "u_sun"), day: gl.getUniformLocation(this.pDay, "u_day"), dir: gl.getAttribLocation(this.pDay, "a_dir") };
        // Fetch the star catalogue and build an interleaved point buffer
        // [dir.xyz, size, col.rgb] (stride 7 floats). Size/brightness by
        // magnitude, colour by B-V index. Crisp points, independent of texture.
        fetch(STARS_URL).then(r => r.json()).then(cat => {
          const arr = [];
          (cat.stars || []).forEach(st => {
            const d = skyDir(st[0], st[1]);
            const mag = st[2], ci = st[3] || 0;
            const size = Math.max(1.0, (STAR_MAG_LIMIT - mag) * STAR_SIZE + 1.0);
            const inten = Math.max(0.25, Math.min(1, (STAR_MAG_LIMIT + 0.3 - mag) / (STAR_MAG_LIMIT + 2)));
            const col = ciColor(ci);
            arr.push(d[0], d[1], d[2], size, col[0] * inten, col[1] * inten, col[2] * inten);
          });
          this.starVbo = buf(new Float32Array(arr));
          this.starCount = (cat.stars || []).length;
          this._starsReady = true;
          map.triggerRepaint();
        }).catch(e => setDbg("stars load failed"));
      },
      render(gl, matrix) {
        const mat = (matrix && matrix.length) ? matrix
          : (matrix && ((matrix.defaultProjectionData && matrix.defaultProjectionData.mainMatrix) || matrix.mainMatrix || matrix.modelViewProjectionMatrix)) || matrix;
        const now = new Date(), lst = (gmstDeg(now) + OBS_LON) % 360;
        const su = sunEq(now), sp = eqToAltAz(su.ra, su.dec, lst);
        const sunAlt = forceNight ? -18 : forceDay ? 25 : sp.alt;
        this._f = (this._f || 0) + 1;
        setDbg("night=" + (sunAlt < NIGHT_ALT ? "Y" : "N") + " mw=" +
          (this._texReady ? "Y" : (this._texErr ? "ERR" : "…")) +
          " stars=" + (this._starsReady ? this.starCount : "…") +
          " sun=" + sunAlt.toFixed(0) + "° f=" + this._f + (mat && mat.length ? "" : " MAT!"));
        if (!terrainOn) return;                           // 2D (terrain off) → no sky layer
        // Sky shares the terrain's matrix/FOV (azimuth locked to the ground); only
        // altitude is compressed in the shader via SKY_VC (see the SKY_VC comment).
        if (sunAlt >= NIGHT_ALT) {
          // ---------- DAYTIME: gradient sky dome + astronomically placed sun ----------
          // Same infinite skybox as the stars (dir at w=0, forced to the far
          // plane) so terrain occludes the horizon. The dome fills the sky above
          // the ridgeline; the sun disc is a round point at the real solar alt/az.
          gl.disable(gl.CULL_FACE);
          gl.enable(gl.DEPTH_TEST); gl.depthFunc(gl.LEQUAL); gl.depthMask(false); gl.disable(gl.BLEND);
          const dayF = Math.max(0, Math.min(1, (sunAlt + 6) / 12));   // twilight dim/warm 0..1
          const sd = skyDir(su.ra, su.dec);                            // sun direction, same frame
          gl.useProgram(this.pDay);
          gl.uniformMatrix4fv(this.D.m, false, mat); gl.uniform1f(this.D.sc, SKY_VC);
          gl.uniform3f(this.D.sun, sd[0], sd[1], sd[2]); gl.uniform1f(this.D.day, dayF);
          gl.bindBuffer(gl.ARRAY_BUFFER, this.sDir); gl.enableVertexAttribArray(this.D.dir); gl.vertexAttribPointer(this.D.dir, 3, gl.FLOAT, false, 0, 0);
          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.sIdx); gl.drawElements(gl.TRIANGLES, this.sCount, gl.UNSIGNED_SHORT, 0);
          if (sp.alt > -0.5) {   // sun disc only when it's above the horizon
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            gl.useProgram(this.pFlat);
            gl.uniformMatrix4fv(this.F.m, false, mat); gl.uniform1f(this.F.sc, SKY_VC);
            gl.uniform1f(this.F.rd, 1.0); gl.uniform1f(this.F.sz, Math.min(24 * (window.devicePixelRatio || 1), 56));
            gl.uniform4f(this.F.col, 1.0, 0.95, 0.82, 1.0);
            gl.disableVertexAttribArray(this.F.dir); gl.vertexAttrib3f(this.F.dir, sd[0], sd[1], sd[2]);
            gl.drawArrays(gl.POINTS, 0, 1);
            gl.disable(gl.BLEND);
          }
          return;
        }
        gl.disable(gl.CULL_FACE);
        gl.enable(gl.DEPTH_TEST); gl.depthFunc(gl.LEQUAL); gl.depthMask(false); gl.disable(gl.BLEND);
        // Star sphere: NASA texture once loaded, else a solid fill so we can
        // still see the sphere draws (isolates texture issues from geometry).
        if (this._texReady) {
          gl.useProgram(this.pTex);
          gl.uniformMatrix4fv(this.T.m, false, mat); gl.uniform1f(this.T.sc, SKY_VC);
          gl.uniform1f(this.T.bk, MW_BLACK); gl.uniform1f(this.T.gn, MW_GAIN); gl.uniform1f(this.T.pw, MW_POW); gl.uniform1f(this.T.bo, MW_BOOST); gl.uniform1f(this.T.fg, MW_FGAIN);
          gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.tex); gl.uniform1i(this.T.tx, 0);
          gl.bindBuffer(gl.ARRAY_BUFFER, this.sDir); gl.enableVertexAttribArray(this.T.dir); gl.vertexAttribPointer(this.T.dir, 3, gl.FLOAT, false, 0, 0);
          gl.bindBuffer(gl.ARRAY_BUFFER, this.sUv); gl.enableVertexAttribArray(this.T.uv); gl.vertexAttribPointer(this.T.uv, 2, gl.FLOAT, false, 0, 0);
          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.sIdx); gl.drawElements(gl.TRIANGLES, this.sCount, gl.UNSIGNED_SHORT, 0);
        } else {
          gl.useProgram(this.pFlat);
          gl.uniformMatrix4fv(this.F.m, false, mat); gl.uniform1f(this.F.sc, SKY_VC);
          gl.uniform1f(this.F.rd, 0.0); gl.uniform1f(this.F.sz, 1.0); gl.uniform4f(this.F.col, 0.04, 0.06, 0.12, 1.0);
          gl.bindBuffer(gl.ARRAY_BUFFER, this.sDir); gl.enableVertexAttribArray(this.F.dir); gl.vertexAttribPointer(this.F.dir, 3, gl.FLOAT, false, 0, 0);
          gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.sIdx); gl.drawElements(gl.TRIANGLES, this.sCount, gl.UNSIGNED_SHORT, 0);
        }

        // over the Milky-Way glow; the terrain still occludes them (z far).
        if (this._starsReady) {
          gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE);

          gl.enableVertexAttribArray(this.S.size); gl.vertexAttribPointer(this.S.size, 1, gl.FLOAT, false, 28, 12);
          gl.enableVertexAttribArray(this.S.col); gl.vertexAttribPointer(this.S.col, 3, gl.FLOAT, false, 28, 16);
